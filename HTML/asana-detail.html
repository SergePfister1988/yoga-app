<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Asana-Detail – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB;
  --color-surface: #FFFFFF;
  --color-pine: #572E2A;
  --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4;
  --color-sand-dark: #C08F84;
  --color-text: #1E2622;
  --color-text-muted: #5B6660;
  --color-border: #DBDFD5;
  --color-stretch: #4E7A66;
  --color-strengthen: #B98A3E;
  --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-script: "Alex Brush", cursive;
  --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
a { color: inherit; }

.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
.app-header .brand { font-family: var(--font-display); font-size: 20px; color: var(--color-pine-dark); text-decoration:none; }
.nav-links { display: flex; gap: 20px; margin-left: 32px; }
.nav-links a { font-size: 14px; color: var(--color-text-muted); font-weight: 600; text-decoration: none; }
.nav-links a.active, .nav-links a:hover { color: var(--color-pine); }
.header-left { display: flex; align-items: center; }
.role-badge { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--color-sand); color: #fff; margin-left: 10px; }

.btn-primary { padding: 10px 18px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 14px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-secondary { padding: 8px 16px; background: transparent; color: var(--color-pine-dark); border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; text-decoration: none; display: inline-block; }
.btn-secondary:hover { border-color: var(--color-pine); }
.btn-danger { padding: 8px 16px; background: transparent; color: var(--color-error); border: 1px solid var(--color-error); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; }

.app-main { padding: 32px; max-width: 760px; margin: 0 auto; }
.back-link { font-size: 13px; color: var(--color-text-muted); text-decoration: none; }
.back-link:hover { color: var(--color-pine); }

.title-row { display: flex; justify-content: space-between; align-items: flex-start; margin-top: 12px; }
.sanskrit { font-size: 13px; color: var(--color-text-muted); }
h1 { font-family: var(--font-display); color: var(--color-pine-dark); margin: 4px 0 12px 0; }
.admin-buttons { display: flex; gap: 8px; }

.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
.tag { font-size: 11px; padding: 3px 9px; border-radius: 12px; background: var(--color-bg); border: 1px solid var(--color-border); color: var(--color-text-muted); }
.tag.category { background: var(--color-pine-dark); color: #fff; }
.tag.reviewed { background: rgba(87,46,42,0.08); color: var(--color-pine); border-color: transparent; font-weight: 600; }
.tag.stretch { background: rgba(78,122,102,0.12); color: var(--color-stretch); border-color: transparent; }
.tag.strengthen { background: rgba(185,138,62,0.14); color: var(--color-strengthen); border-color: transparent; }

.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 22px 24px; margin-bottom: 18px; }
.card h2 { font-family: var(--font-display); font-size: 17px; color: var(--color-pine-dark); margin: 0 0 12px 0; }
.card ol, .card ul { margin: 0; padding-left: 20px; }
.card li { margin-bottom: 6px; line-height: 1.5; }
.muted { color: var(--color-text-muted); font-size: 14px; }

.media-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
.media-grid img, .media-grid video { width: 100%; border-radius: 4px; display: block; }

.related-list { display: flex; flex-wrap: wrap; gap: 8px; }
.related-list a { font-size: 13px; padding: 6px 12px; background: var(--color-bg); border-radius: 3px; text-decoration: none; color: var(--color-pine-dark); border: 1px solid var(--color-border); }
.related-list a:hover { border-color: var(--color-pine); }

@media (max-width: 640px) {
  .app-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .header-left { flex-wrap: wrap; gap: 8px; }
  .nav-links { margin-left: 0; gap: 14px; }
  .app-main { padding: 20px 16px; }
  .title-row { flex-direction: column; gap: 12px; }
  .admin-buttons { width: 100%; }
  .admin-buttons a, .admin-buttons button { flex: 1; text-align: center; }
  .card { padding: 18px 16px; }
  .media-grid { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
}

.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 44px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) {
  .brand-banner { padding: 8px 16px; }
    .brand-script { font-size: 32px; }
  .brand-serif { font-size: 14px; }
}
  </style>
</head>
<body>
  <div class="brand-banner"><a href="dashboard.html" class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></a></div>
  <header class="app-header">
    <div class="header-left">
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>

        <a href="verwaltung.html" id="nav-verwaltung" style="display:none;">Verwaltung</a>
        <a href="users.html" id="nav-users" style="display:none;">Benutzer</a>
      </nav>
      <span class="role-badge" id="role-badge" style="display:none;"></span>
    </div>
    <button class="btn-secondary" id="logout-btn">Ausloggen</button>
  </header>

  <main class="app-main">
    <a href="asanas.html" class="back-link" id="back-link">← Zurück zur Übersicht</a>

    <div id="content"></div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function roleLabel(role, gender) {
      if (role === "admin") return "Admin";
      if (role === "therapeut") {
        if (gender === "frau") return "Therapeutin";
        if (gender === "mann") return "Therapeut";
        return "Therapeut:in";
      }
      if (role === "yogi") {
        if (gender === "frau") return "Yogini";
        if (gender === "mann") return "Yogi";
        return "Yogi:ni";
      }
      if (role === "anbieter") {
        if (gender === "frau") return "Anbieterin";
        if (gender === "mann") return "Anbieter";
        return "Anbieter:in";
      }
      return role;
    }

    const asanaId = new URLSearchParams(window.location.search).get("id");
    let isAdmin = false;

    (function setupBackLink() {
      const params = new URLSearchParams(window.location.search);
      const backUrl = params.get("back");
      const backLabel = params.get("backLabel");
      if (backUrl) {
        const link = document.getElementById("back-link");
        link.href = backUrl;
        link.textContent = "← " + (backLabel || "Zurück");
      }
    })();

    async function init() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) {
        window.location.href = "index.html";
        return;
      }

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("role, gender")
        .eq("id", sessionData.session.user.id)
        .single();

      if (profile) {
        const badge = document.getElementById("role-badge");
        badge.textContent = roleLabel(profile.role, profile.gender);
        badge.style.display = "inline-block";
        if (profile.role === "admin" || profile.role === "therapeut") {
          const nv = document.getElementById("nav-verwaltung");
          if (nv) nv.style.display = "inline";
        }
        if (profile.role === "admin") {
          const nu = document.getElementById("nav-users");
          if (nu) nu.style.display = "inline";
        }
        if (profile.role === "anbieter") {
          }
        if (profile.role === "admin") {
          }
        if (profile.role === "therapeut") {
          }
        if (profile.role === "yogi") {
          }
isAdmin = profile.role === "admin";
        if (profile.role === "admin" || profile.role === "therapeut") {
          if (profile.role === "therapeut") {
            }
        }
      }

      if (!asanaId) {
        document.getElementById("content").innerHTML = "<p>Keine Asana angegeben.</p>";
        return;
      }

      await loadAsana();
    }

    async function loadAsana() {
      const { data: a, error } = await supabaseClient
        .from("asanas")
        .select(`
          id, name_deutsch, name_sanskrit, difficulty, hold_duration, counter_pose,
          reviewed, reviewed_at, reviewed_by,
          reviewer:profiles!asanas_reviewed_by_fkey ( email ),
          verified, verified_at, verified_by,
          verifier:profiles!asanas_verified_by_fkey ( email ),
          asana_category_links ( asana_categories ( name ) ),
          asana_benefits ( id, content ),
          asana_contraindications ( id, content ),
          asana_media ( id, media_type, storage_path, caption ),
          asana_muscle_groups ( effect, muscle_groups ( name ) ),
          asana_joint_regions ( joint_regions ( name ) ),
          asana_equipment ( equipment ( name ) )
        `)
        .eq("id", asanaId)
        .single();

      if (error || !a) {
        document.getElementById("content").innerHTML = "<p>Asana nicht gefunden.</p>";
        return;
      }

      // Varianten sind beim Speichern bereits beidseitig verknüpft worden
      const { data: related } = await supabaseClient
        .from("asana_related")
        .select("relation_type, related_asana_id, asanas:related_asana_id ( id, name_deutsch )")
        .eq("asana_id", asanaId)
        .eq("relation_type", "Variante");

      render(a, related || []);
    }

    function esc(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    function render(a, related) {
      const stretch = (a.asana_muscle_groups || []).filter(mg => mg.effect === "dehnt");
      const strengthen = (a.asana_muscle_groups || []).filter(mg => mg.effect === "kräftigt");

      let html = "";

      html += `<div class="title-row">
        <div>
          ${a.name_sanskrit ? `<div class="sanskrit">${esc(a.name_sanskrit)}</div>` : ""}
          <h1>${esc(a.name_deutsch)}</h1>
        </div>`;
      if (isAdmin) {
        html += `<div class="admin-buttons">
          <a href="asana-form.html?id=${a.id}" class="btn-secondary">Bearbeiten</a>
          <a href="asana-form.html?duplicate=${a.id}" class="btn-secondary">Duplizieren</a>
          <button class="btn-danger" id="delete-btn">Löschen</button>
        </div>`;
      }
      html += `</div>`;

      html += `<div class="tag-row">`;
      (a.asana_category_links || []).forEach(cl => {
        if (cl.asana_categories) html += `<span class="tag category">${esc(cl.asana_categories.name)}</span>`;
      });
      if (a.difficulty) html += `<span class="tag">${esc(a.difficulty)}</span>`;
      if (a.hold_duration) html += `<span class="tag">Haltedauer: ${esc(a.hold_duration)}</span>`;
      if (a.reviewed && isAdmin) html += `<span class="tag reviewed">✓ Erfasst</span>`;
      if (a.verified && isAdmin) html += `<span class="tag reviewed">✓ Geprüft</span>`;
      html += `</div>`;

      if (a.asana_media && a.asana_media.length) {
        html += `<div class="card"><div class="media-grid">`;
        a.asana_media.forEach(m => {
          const { data: pub } = supabaseClient.storage.from("asana-media").getPublicUrl(m.storage_path);
          const url = pub.publicUrl;
          if (m.media_type === "image") {
            html += `<img src="${url}" alt="${esc(m.caption || a.name_deutsch)}" />`;
          } else {
            html += `<video src="${url}" controls></video>`;
          }
        });
        html += `</div>
          <p style="font-size:12px; color: var(--color-text-muted); margin: 10px 0 0 0;">Hinweis: Das Bild dient nur als Anhaltspunkt und ersetzt keine Anleitung durch einen/eine Yogalehrer:in.</p>
        </div>`;
      }

      html += `<div class="card"><h2>Muskelgruppen</h2>`;
      if (stretch.length) {
        html += `<p class="muted" style="margin-bottom:6px;">Gedehnt:</p><div class="tag-row" style="margin-bottom:14px;">`;
        stretch.forEach(mg => { html += `<span class="tag stretch">${esc(mg.muscle_groups.name)}</span>`; });
        html += `</div>`;
      }
      if (strengthen.length) {
        html += `<p class="muted" style="margin-bottom:6px;">Gekräftigt:</p><div class="tag-row">`;
        strengthen.forEach(mg => { html += `<span class="tag strengthen">${esc(mg.muscle_groups.name)}</span>`; });
        html += `</div>`;
      }
      if (!stretch.length && !strengthen.length) html += `<p class="muted">Keine Angaben.</p>`;
      html += `</div>`;

      if ((a.asana_joint_regions || []).length) {
        html += `<div class="card"><h2>Betroffene Gelenke / Regionen</h2><div class="tag-row">`;
        a.asana_joint_regions.forEach(jr => { html += `<span class="tag">${esc(jr.joint_regions.name)}</span>`; });
        html += `</div></div>`;
      }

      if (a.asana_benefits && a.asana_benefits.length) {
        html += `<div class="card"><h2>Vorteile / Wirkung</h2><ul>`;
        a.asana_benefits.forEach(b => { html += `<li>${esc(b.content)}</li>`; });
        html += `</ul></div>`;
      }

      if (a.asana_contraindications && a.asana_contraindications.length) {
        html += `<div class="card"><h2>Wann ist Vorsicht geboten?</h2><ul>`;
        a.asana_contraindications.forEach(c => { html += `<li>${esc(c.content)}</li>`; });
        html += `</ul></div>`;
      }

      if (a.counter_pose) {
        html += `<div class="card"><h2>Ausgleichshaltung</h2><p>${esc(a.counter_pose)}</p></div>`;
      }

      if ((a.asana_equipment || []).length) {
        html += `<div class="card"><h2>Hilfsmittel</h2><div class="tag-row">`;
        a.asana_equipment.forEach(e => { html += `<span class="tag">${esc(e.equipment.name)}</span>`; });
        html += `</div></div>`;
      }

      if (related.length) {
        const items = related.filter(r => r.relation_type === "Variante" && r.asanas);
        if (items.length) {
          html += `<div class="card"><h2>Varianten</h2><div class="related-list">`;
          items.forEach(r => { html += `<a href="asana-detail.html?id=${r.asanas.id}">${esc(r.asanas.name_deutsch)}</a>`; });
          html += `</div></div>`;
        }
      }


      document.getElementById("content").innerHTML = html;

      const deleteBtn = document.getElementById("delete-btn");
      if (deleteBtn) {
        deleteBtn.addEventListener("click", async () => {
          if (!confirm("Diese Asana wirklich löschen? Das kann nicht rückgängig gemacht werden.")) return;
          const { error } = await supabaseClient.from("asanas").delete().eq("id", a.id);
          if (error) {
            alert("Fehler beim Löschen: " + error.message);
            return;
          }
          window.location.href = "asanas.html";
        });
      }
    }

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    init();
  </script>
</body>
</html>
