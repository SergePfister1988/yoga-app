<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vorlagen verwalten – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB; --color-surface: #FFFFFF; --color-pine: #572E2A; --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4; --color-sand-dark: #C08F84; --color-text: #1E2622; --color-text-muted: #5B6660;
  --color-border: #DBDFD5; --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif; --font-script: "Alex Brush", cursive; --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
a { color: inherit; text-decoration: none; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
.nav-links { display: flex; gap: 20px; margin-left: 32px; flex-wrap: wrap; }
.nav-links a { font-size: 14px; color: var(--color-text-muted); font-weight: 600; }
.nav-links a.active, .nav-links a:hover { color: var(--color-pine); }
.header-left { display: flex; align-items: center; flex-wrap: wrap; }
.role-badge { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--color-sand); color: #fff; margin-left: 10px; }
.btn-primary { padding: 10px 18px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 14px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-secondary { padding: 8px 16px; background: transparent; color: var(--color-pine-dark); border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; text-decoration: none; display: inline-block; }
.btn-danger { padding: 8px 16px; background: transparent; color: var(--color-error); border: 1px solid var(--color-error); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; }
.app-main { padding: 32px; max-width: 800px; margin: 0 auto; }
.app-main h1 { font-family: var(--font-display); color: var(--color-pine-dark); margin-top: 0; }
.app-main > p.intro { color: var(--color-text-muted); font-size: 14px; margin-top: -10px; margin-bottom: 24px; }
.template-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 16px 20px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
.template-name { font-family: var(--font-display); font-size: 18px; color: var(--color-pine-dark); }
.template-meta { font-size: 12px; color: var(--color-text-muted); }
.template-actions { display: flex; gap: 8px; }
.empty-state { color: var(--color-text-muted); padding: 40px 0; text-align: center; }
@media (max-width: 640px) {
  .app-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .nav-links { margin-left: 0; gap: 14px; }
  .app-main { padding: 20px 16px; }
}
.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 44px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) { .brand-banner { padding: 8px 16px; } .brand-script { font-size: 32px; } .brand-serif { font-size: 14px; } }
  </style>
</head>
<body>
  <div class="brand-banner"><a href="dashboard.html" class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></a></div>
  <header class="app-header">
    <div class="header-left">
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>

      </nav>
      <span class="role-badge" id="role-badge" style="display:none;"></span>
    </div>
    <button class="btn-secondary" id="logout-btn">Ausloggen</button>
  </header>

  <main class="app-main">
    <h1>Vorlagen verwalten</h1>
    <p class="intro">Dokumentenvorlagen, die Therapeut:innen beim Erstellen eines Benutzerdokuments auswählen können.</p>

    <div style="margin-bottom: 20px;">
      <a href="dokumentvorlage-form.html"><button class="btn-primary">+ Neue Vorlage</button></a>
    </div>

    <div id="template-list"></div>
    <p id="empty-state" class="empty-state" style="display:none;"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function roleLabel(role, gender) {
      if (role === "admin") return "Admin";
      if (role === "therapeut") {
        if (gender === "frau") return "Therapeutin";
        if (gender === "mann") return "Therapeut";
        return "Therapeut:in";
      }
      if (role === "yogi") {
        if (gender === "frau") return "Yogini";
        if (gender === "mann") return "Yogi";
        return "Yogi:ni";
      }
      if (role === "anbieter") {
        if (gender === "frau") return "Anbieterin";
        if (gender === "mann") return "Anbieter";
        return "Anbieter:in";
      }
      return role;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    async function init() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) { window.location.href = "index.html"; return; }

      const { data: profile } = await supabaseClient.from("profiles").select("role, gender").eq("id", sessionData.session.user.id).single();
      if (!profile || profile.role !== "admin") {
        alert("Diese Seite ist nur für Admins.");
        window.location.href = "dashboard.html";
        return;
      }

      const badge = document.getElementById("role-badge");
      badge.textContent = roleLabel(profile.role, profile.gender);
      badge.style.display = "inline-block";
        if (profile.role === "anbieter") {
          }

      await loadTemplates();
    }

    async function loadTemplates() {
      const { data, error } = await supabaseClient
        .from("document_templates")
        .select("id, name, sort_order, fields")
        .order("sort_order");

      const listEl = document.getElementById("template-list");
      const emptyEl = document.getElementById("empty-state");
      listEl.innerHTML = "";

      if (error) {
        emptyEl.style.display = "block";
        emptyEl.textContent = "Fehler beim Laden: " + error.message;
        return;
      }
      if (!data || !data.length) {
        emptyEl.style.display = "block";
        emptyEl.textContent = "Noch keine Vorlagen vorhanden.";
        return;
      }
      emptyEl.style.display = "none";

      data.forEach(t => {
        const sectionCount = (t.fields && t.fields.sections) ? t.fields.sections.length : 0;
        const card = document.createElement("div");
        card.className = "template-card";
        card.innerHTML = `
          <div>
            <div class="template-name">${escapeHtml(t.name)}</div>
            <div class="template-meta">${sectionCount} Abschnitt${sectionCount === 1 ? "" : "e"}</div>
          </div>
          <div class="template-actions">
            <a href="dokumentvorlage-form.html?id=${t.id}"><button class="btn-secondary">Bearbeiten</button></a>
            <button class="btn-danger" data-delete="${t.id}">Löschen</button>
          </div>
        `;
        card.querySelector("[data-delete]").addEventListener("click", async () => {
          if (!confirm(`Vorlage "${t.name}" wirklich löschen? Bereits erstellte Dokumente mit dieser Vorlage bleiben bestehen, verlieren aber den Vorlagen-Bezug.`)) return;
          const { error } = await supabaseClient.from("document_templates").delete().eq("id", t.id);
          if (error) { alert("Fehler: " + error.message); return; }
          await loadTemplates();
        });
        listEl.appendChild(card);
      });
    }

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    init();
  </script>
</body>
</html>
