<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mein Kontakt – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB; --color-surface: #FFFFFF; --color-pine: #572E2A; --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4; --color-sand-dark: #C08F84; --color-text: #1E2622; --color-text-muted: #5B6660;
  --color-border: #DBDFD5; --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif; --font-script: "Alex Brush", cursive; --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
a { color: inherit; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
.nav-links { display: flex; gap: 20px; margin-left: 32px; flex-wrap: wrap; }
.nav-links a { font-size: 14px; color: var(--color-text-muted); font-weight: 600; text-decoration: none; }
.nav-links a.active, .nav-links a:hover { color: var(--color-pine); }
.header-left { display: flex; align-items: center; flex-wrap: wrap; }
.role-badge { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--color-sand); color: #fff; margin-left: 10px; }
.btn-secondary { padding: 8px 16px; background: transparent; color: var(--color-pine-dark); border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; text-decoration: none; display: inline-block; }
.app-main { padding: 32px; max-width: 700px; margin: 0 auto; }
.app-main h1 { font-family: var(--font-display); color: var(--color-pine-dark); margin-top: 8px; }
.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 22px 24px; margin-bottom: 18px; color: var(--color-text); font-size: 14px; line-height: 1.6; }
.card h2 { font-family: var(--font-display); font-size: 16px; color: var(--color-pine-dark); margin: 0 0 10px 0; }
.company-name { font-family: var(--font-display); font-size: 26px; color: var(--color-pine-dark); margin: 8px 0 4px 0; }
.about-me { font-size: 15px; line-height: 1.7; color: var(--color-text); margin-bottom: 20px; white-space: pre-wrap; }
.contact-row { display: flex; gap: 8px; font-size: 14px; margin-bottom: 6px; }
.contact-row .label { color: var(--color-text-muted); min-width: 70px; }
.channel-links { display: flex; flex-wrap: wrap; gap: 8px; }
.channel-links a { font-size: 13px; padding: 7px 14px; background: var(--color-bg); border: 1px solid var(--color-border); border-radius: 14px; text-decoration: none; color: var(--color-pine-dark); }
.channel-links a:hover { border-color: var(--color-pine); }
.therapist-tag { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px; background: var(--color-pine-dark); color: #fff; display: inline-block; margin-bottom: 10px; }
.share-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--color-border); }
.share-row:last-child { border-bottom: none; }
.btn-small { padding: 6px 12px; font-size: 12px; background: transparent; border: 1px solid var(--color-border); border-radius: 3px; cursor: pointer; color: var(--color-text-muted); }
.btn-small:hover { border-color: var(--color-error); color: var(--color-error); }
.add-share-row { display: flex; gap: 8px; margin-top: 14px; }
.add-share-row select { flex: 1; padding: 9px 10px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); background: var(--color-bg); }
.btn-primary { padding: 9px 16px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 13px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-primary:disabled { opacity: 0.5; cursor: default; }
.form-message { font-size: 13px; margin-top: 10px; }
.form-message.error { color: var(--color-error); }
.form-message.success { color: var(--color-pine); }
@media (max-width: 640px) {
  .app-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .nav-links { margin-left: 0; gap: 14px; }
  .app-main { padding: 20px 16px; }
}
.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 44px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) { .brand-banner { padding: 8px 16px; } .brand-script { font-size: 32px; } .brand-serif { font-size: 14px; } }
  </style>
</head>
<body>
  <div class="brand-banner"><a href="dashboard.html" class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></a></div>
  <header class="app-header">
    <div class="header-left">
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>

        <a href="verwaltung.html" id="nav-verwaltung" style="display:none;">Verwaltung</a>
        <a href="users.html" id="nav-users" style="display:none;">Benutzer</a>
      </nav>
      <span class="role-badge" id="role-badge" style="display:none;"></span>
    </div>
    <button class="btn-secondary" id="logout-btn">Ausloggen</button>
  </header>

  <main class="app-main">
    <a href="dashboard.html" class="btn-secondary" style="margin-bottom: 10px;">← Zurück zum Dashboard</a>
    <div id="content">
      <h1>Mein Kontakt</h1>
      <p class="card">Lädt …</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function roleLabel(role, gender) {
      if (role === "admin") return "Admin";
      if (role === "therapeut") {
        if (gender === "frau") return "Therapeutin";
        if (gender === "mann") return "Therapeut";
        return "Therapeut:in";
      }
      if (role === "yogi") {
        if (gender === "frau") return "Yogini";
        if (gender === "mann") return "Yogi";
        return "Yogi:ni";
      }
      if (role === "anbieter") {
        if (gender === "frau") return "Anbieterin";
        if (gender === "mann") return "Anbieter";
        return "Anbieter:in";
      }
      return role;
    }

    async function init() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) { window.location.href = "index.html"; return; }

      const { data: profile } = await supabaseClient.from("profiles").select("role, gender").eq("id", sessionData.session.user.id).single();
      if (!profile || profile.role !== "yogi") {
        alert("Diese Seite ist nur für Yogi:nis.");
        window.location.href = "dashboard.html";
        return;
      }

      const badge = document.getElementById("role-badge");
      badge.textContent = roleLabel(profile.role, profile.gender);
      badge.style.display = "inline-block";
        if (profile.role === "admin" || profile.role === "therapeut") {
          const nv = document.getElementById("nav-verwaltung");
          if (nv) nv.style.display = "inline";
        }
        if (profile.role === "admin") {
          const nu = document.getElementById("nav-users");
          if (nu) nu.style.display = "inline";
        }
        if (profile.role === "anbieter") {
          }
      await loadContact(sessionData.session.user.id);
    }

    function esc(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    let currentYogiId = null;
    let primaryTherapistId = null;
    let sharedTherapistIds = [];

    async function loadContact(yogiId) {
      currentYogiId = yogiId;
      const contentEl = document.getElementById("content");

      const [{ data: myProfile }, { data: shares }] = await Promise.all([
        supabaseClient.from("profiles").select("assigned_therapist_id").eq("id", yogiId).single(),
        supabaseClient.from("therapist_shares").select("therapist_id").eq("yogi_id", yogiId),
      ]);

      primaryTherapistId = myProfile ? myProfile.assigned_therapist_id : null;
      sharedTherapistIds = (shares || []).map(s => s.therapist_id);
      const allTherapistIds = [...new Set([primaryTherapistId, ...sharedTherapistIds].filter(Boolean))];

      let html = `<h1>Mein Kontakt</h1>`;

      if (!allTherapistIds.length) {
        html += `<div class="card">Dir ist aktuell keine Therapeut:in zugewiesen.</div>`;
      } else {
        const [{ data: decls }, { data: channels }, { data: therapistProfiles }] = await Promise.all([
          supabaseClient.from("therapist_self_declarations")
            .select("therapist_id, company_name, about_me, offering, contact_email, contact_phone")
            .in("therapist_id", allTherapistIds),
          supabaseClient.from("therapist_channels")
            .select("therapist_id, label, url, sort_order")
            .in("therapist_id", allTherapistIds)
            .order("sort_order"),
          supabaseClient.from("profiles")
            .select("id, first_name, last_name, email, gender")
            .in("id", allTherapistIds),
        ]);

        allTherapistIds.forEach(tid => {
          const decl = (decls || []).find(d => d.therapist_id === tid);
          const therapistChannels = (channels || []).filter(c => c.therapist_id === tid);
          const therapistProfile = (therapistProfiles || []).find(p => p.id === tid);
          const isPrimary = tid === primaryTherapistId;
          const fallbackName = therapistProfile
            ? ([therapistProfile.first_name, therapistProfile.last_name].filter(Boolean).join(" ") || therapistProfile.email)
            : "Therapeut:in";

          html += `<div class="card">`;
          html += `<span class="therapist-tag">${isPrimary ? "Haupt-Therapeut:in" : "Geteilt"}</span>`;

          if (!decl) {
            html += `<div class="company-name">${esc(fallbackName)}</div><p>Noch keine Angaben hinterlegt.</p>`;
          } else {
            if (decl.company_name) html += `<div class="company-name">${esc(decl.company_name)}</div>`;
            if (decl.about_me) html += `<div class="about-me">${esc(decl.about_me)}</div>`;
            if (decl.offering) html += `<h2>Mein Angebot</h2><div class="about-me" style="margin-bottom:20px;">${esc(decl.offering)}</div>`;
            if (decl.contact_email || decl.contact_phone) {
              html += `<h2>Kontakt</h2>`;
              if (decl.contact_email) html += `<div class="contact-row"><span class="label">E-Mail</span><span>${esc(decl.contact_email)}</span></div>`;
              if (decl.contact_phone) html += `<div class="contact-row"><span class="label">Telefon</span><span>${esc(decl.contact_phone)}</span></div>`;
            }
            if (therapistChannels.length) {
              html += `<h2 style="margin-top:20px;">Kanäle</h2><div class="channel-links">`;
              therapistChannels.forEach(c => {
                const href = /^https?:\/\//i.test(c.url) ? c.url : "https://" + c.url;
                html += `<a href="${esc(href)}" target="_blank" rel="noopener">${esc(c.label)}</a>`;
              });
              html += `</div>`;
            }
          }
          html += `</div>`;
        });
      }

      html += `<div class="card" id="share-management">
        <h2>Meine Daten teilen</h2>
        <p style="font-size:13px; color: var(--color-text-muted); margin-bottom:10px;">
          Zusätzlich zu deiner Haupt-Therapeut:in kannst du deine Akte mit bis zu 3 weiteren Therapeut:innen teilen.
        </p>
        <div id="share-list"></div>
        <div class="add-share-row" id="add-share-row"></div>
        <p class="form-message" id="share-message"></p>
      </div>`;

      contentEl.innerHTML = html;
      await renderShareManagement();
    }

    async function renderShareManagement() {
      const shareListEl = document.getElementById("share-list");
      const addRowEl = document.getElementById("add-share-row");
      const messageEl = document.getElementById("share-message");

      const { data: allTherapists } = await supabaseClient
        .from("profiles")
        .select("id, first_name, last_name, email")
        .eq("role", "therapeut");

      const nameOf = (t) => [t.first_name, t.last_name].filter(Boolean).join(" ") || t.email;

      shareListEl.innerHTML = "";
      if (!sharedTherapistIds.length) {
        shareListEl.innerHTML = `<p style="font-size:13px; color: var(--color-text-muted);">Aktuell mit niemandem zusätzlich geteilt.</p>`;
      } else {
        sharedTherapistIds.forEach(tid => {
          const t = (allTherapists || []).find(x => x.id === tid);
          const row = document.createElement("div");
          row.className = "share-row";
          row.innerHTML = `<span>${esc(t ? nameOf(t) : "Unbekannt")}</span><button type="button" class="btn-small" data-remove="${tid}">Entfernen</button>`;
          row.querySelector("button").addEventListener("click", async () => {
            const { error } = await supabaseClient.from("therapist_shares").delete().eq("yogi_id", currentYogiId).eq("therapist_id", tid);
            if (error) { messageEl.textContent = "Fehler: " + error.message; messageEl.className = "form-message error"; return; }
            await loadContact(currentYogiId);
          });
          shareListEl.appendChild(row);
        });
      }

      addRowEl.innerHTML = "";
      if (sharedTherapistIds.length < 3) {
        const excludeIds = new Set([primaryTherapistId, ...sharedTherapistIds].filter(Boolean));
        const options = (allTherapists || []).filter(t => !excludeIds.has(t.id));
        const select = document.createElement("select");
        select.innerHTML = `<option value="">– Therapeut:in auswählen –</option>` +
          options.map(t => `<option value="${t.id}">${esc(nameOf(t))}</option>`).join("");
        const btn = document.createElement("button");
        btn.className = "btn-primary";
        btn.type = "button";
        btn.textContent = "Freigeben";
        btn.addEventListener("click", async () => {
          if (!select.value) return;
          btn.disabled = true;
          const { error } = await supabaseClient.from("therapist_shares").insert({ yogi_id: currentYogiId, therapist_id: select.value });
          if (error) {
            messageEl.textContent = "Fehler: " + error.message;
            messageEl.className = "form-message error";
            btn.disabled = false;
            return;
          }
          await loadContact(currentYogiId);
        });
        addRowEl.appendChild(select);
        addRowEl.appendChild(btn);
      } else {
        addRowEl.innerHTML = `<p style="font-size:13px; color: var(--color-text-muted);">Maximum von 3 zusätzlichen Freigaben erreicht.</p>`;
      }
    }

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    init();
  </script>
</body>
</html>
