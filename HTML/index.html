<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Anmelden – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB;
  --color-surface: #FFFFFF;
  --color-pine: #572E2A;
  --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4;
  --color-sand-dark: #C08F84;
  --color-text: #1E2622;
  --color-text-muted: #5B6660;
  --color-border: #DBDFD5;
  --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-script: "Alex Brush", cursive;
  --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
.auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 48px 40px; width: 100%; max-width: 380px; box-shadow: 0 1px 2px rgba(30, 38, 34, 0.04); }
.auth-eyebrow { font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--color-sand); font-weight: 600; margin: 0 0 8px 0; }
.auth-title { font-family: var(--font-script); font-weight: 400; font-size: 56px; color: var(--color-pine-dark); margin: 0 0 24px 0; line-height: 1; }
.field { margin-bottom: 20px; }
.field label { display: block; font-size: 13px; color: var(--color-text-muted); margin-bottom: 6px; }
.field input { width: 100%; padding: 11px 12px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 15px; font-family: var(--font-body); background: var(--color-bg); color: var(--color-text); }
.field input:focus { outline: 2px solid var(--color-pine); outline-offset: 1px; background: var(--color-surface); }
.btn-primary { width: 100%; padding: 12px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 15px; font-family: var(--font-body); font-weight: 600; cursor: pointer; margin-top: 8px; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-primary:disabled { opacity: 0.6; cursor: default; }
.form-message { font-size: 13px; margin-top: 16px; min-height: 18px; }
.form-message.error { color: var(--color-error); }
.form-message.success { color: var(--color-pine); }

@media (max-width: 480px) {
  .auth-screen { padding: 16px; }
  .auth-card { padding: 32px 24px; }
  .auth-title { font-size: 44px; }
  .field input { font-size: 16px; padding: 12px; }
  .btn-primary { padding: 14px; font-size: 16px; }
}

.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 14px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 54px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) {
  .brand-banner { padding: 10px 16px; }
    .brand-script { font-size: 38px; }
  .brand-serif { font-size: 16px; }
}
  </style>
</head>
<body>
  <div class="brand-banner"><div class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></div></div>
  <div class="auth-screen">
    <div class="auth-card">
      <h1 class="auth-title">Anmelden</h1>

      <form id="login-form" novalidate>
        <div class="field">
          <label for="email">E-Mail</label>
          <input type="email" id="email" name="email" required autocomplete="username" />
        </div>
        <div class="field">
          <label for="password">Passwort</label>
          <input type="password" id="password" name="password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn-primary" id="login-btn">Einloggen</button>
        <p class="form-message" id="form-message"></p>
      </form>

      <a href="#" id="forgot-password-link" style="display:block; text-align:center; margin-top:20px; font-size:13px; color:var(--color-text-muted); text-decoration:none;">Passwort vergessen?</a>

      <div id="forgot-password-panel" style="display:none; margin-top:16px; padding-top:16px; border-top:1px solid var(--color-border);">
        <div class="field">
          <label for="forgot-email">E-Mail</label>
          <input type="email" id="forgot-email" />
        </div>
        <button type="button" class="btn-secondary" id="forgot-submit-btn" style="width:100%;">Link zum Zurücksetzen senden</button>
        <p class="form-message" id="forgot-message"></p>
      </div>
    </div>
  </div>

  <!-- Supabase-Bibliothek laden -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // ============================================================
    // Supabase-Konfiguration
    // Project Settings -> API Keys in deinem Supabase-Projekt
    // ============================================================
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";

    const supabaseClient = window.supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    // ============================================================
    // Falls bereits eine Session besteht, direkt zum Dashboard
    // ============================================================
    (async () => {
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        window.location.href = "dashboard.html";
      }
    })();

    // ============================================================
    // Login-Formular
    // ============================================================
    const form = document.getElementById("login-form");
    const messageEl = document.getElementById("form-message");
    const btn = document.getElementById("login-btn");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      messageEl.textContent = "";
      messageEl.classList.remove("error");
      btn.disabled = true;
      btn.textContent = "Einloggen …";

      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password,
      });

      if (error) {
        messageEl.textContent = "Anmeldung fehlgeschlagen: E-Mail oder Passwort ungültig.";
        messageEl.classList.add("error");
        btn.disabled = false;
        btn.textContent = "Einloggen";
        return;
      }

      window.location.href = "dashboard.html";
    });

    document.getElementById("forgot-password-link").addEventListener("click", (e) => {
      e.preventDefault();
      const panel = document.getElementById("forgot-password-panel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    });

    document.getElementById("forgot-submit-btn").addEventListener("click", async () => {
      const emailInput = document.getElementById("forgot-email");
      const msgEl = document.getElementById("forgot-message");
      const email = emailInput.value.trim();
      if (!email) {
        msgEl.textContent = "Bitte E-Mail-Adresse eingeben.";
        msgEl.className = "form-message error";
        return;
      }
      msgEl.textContent = "Wird gesendet …";
      msgEl.className = "form-message";

      const { error } = await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + window.location.pathname.replace("index.html", "reset-password.html"),
      });

      // Aus Sicherheitsgründen immer dieselbe Meldung zeigen, unabhängig davon ob die
      // E-Mail existiert (kein Rückschluss auf registrierte Adressen möglich)
      msgEl.textContent = "Falls diese E-Mail-Adresse registriert ist, wurde ein Link zum Zurücksetzen des Passworts verschickt.";
      msgEl.className = "form-message success";
    });
  </script>
</body>
</html>
