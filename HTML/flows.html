<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flows – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB;
  --color-surface: #FFFFFF;
  --color-pine: #572E2A;
  --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4;
  --color-sand-dark: #C08F84;
  --color-text: #1E2622;
  --color-text-muted: #5B6660;
  --color-border: #DBDFD5;
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-script: "Alex Brush", cursive;
  --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
a { color: inherit; text-decoration: none; }

.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
.nav-links { display: flex; gap: 20px; margin-left: 32px; }
.nav-links a { font-size: 14px; color: var(--color-text-muted); font-weight: 600; }
.nav-links a.active, .nav-links a:hover { color: var(--color-pine); }
.header-left { display: flex; align-items: center; }
.role-badge { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--color-sand); color: #fff; margin-left: 10px; }

.btn-primary { padding: 10px 18px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 14px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-secondary { padding: 8px 16px; background: transparent; color: var(--color-pine-dark); border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; }
.btn-secondary:hover { border-color: var(--color-pine); }
.btn-danger { padding: 8px 16px; background: transparent; color: var(--color-error, #A6483A); border: 1px solid var(--color-error, #A6483A); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; }

.app-main { padding: 32px; max-width: 1000px; margin: 0 auto; }
.app-main h1 { font-family: var(--font-display); color: var(--color-pine-dark); margin-top: 0; }
.app-main > p.intro { color: var(--color-text-muted); font-size: 14px; margin-top: -10px; margin-bottom: 24px; }

.filter-bar { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 16px 20px; margin-bottom: 20px; }
.filter-bar input { width: 100%; padding: 9px 10px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); background: var(--color-bg); }

.flow-list { display: flex; flex-direction: column; gap: 16px; }
.flow-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 18px; }
.flow-card:hover { border-color: var(--color-pine); }
.flow-card .name { font-family: var(--font-display); font-size: 19px; color: var(--color-pine-dark); margin: 0 0 6px 0; }
.flow-card .desc { font-size: 13px; color: var(--color-text-muted); line-height: 1.4; margin-bottom: 14px; }
.flow-card-actions { display: flex; gap: 8px; margin-top: 14px; max-width: 320px; }
.flow-card-actions a, .flow-card-actions button { flex: 1; text-align: center; font-size: 13px; }

.flow-row { display: flex; align-items: flex-start; gap: 2px; overflow-x: auto; padding-bottom: 6px; }
.flow-step { display: flex; flex-direction: column; align-items: center; min-width: 72px; }
.flow-step .thumb { width: 64px; height: 64px; border: 1px solid var(--color-border); border-radius: 4px; object-fit: cover; background: var(--color-bg); }
.flow-step .thumb-placeholder { width: 64px; height: 64px; border: 1px dashed var(--color-border); border-radius: 4px; background: var(--color-bg); display: flex; align-items: center; justify-content: center; font-size: 10px; color: var(--color-text-muted); text-align: center; }
.flow-step .flow-label { font-size: 11px; font-weight: 600; text-align: center; margin-top: 5px; color: var(--color-text); }
.flow-step .flow-sublabel { font-size: 10px; color: var(--color-text-muted); text-align: center; }
.flow-arrow { color: var(--color-sand-dark); font-size: 18px; padding-top: 24px; flex-shrink: 0; }

.empty-state { color: var(--color-text-muted); padding: 40px 0; text-align: center; }

@media (max-width: 640px) {
  .app-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .header-left { flex-wrap: wrap; gap: 8px; }
  .nav-links { margin-left: 0; gap: 14px; }
  .app-main { padding: 20px 16px; }
  .flow-list { grid-template-columns: 1fr; }
  #admin-actions .btn-primary { width: 100%; padding: 13px; }
}

.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 44px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) {
  .brand-banner { padding: 8px 16px; }
  .brand-script { font-size: 32px; }
  .brand-serif { font-size: 14px; }
}
  </style>
</head>
<body>
  <div class="brand-banner"><a href="dashboard.html" class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></a></div>
  <header class="app-header">
    <div class="header-left">
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>

      </nav>
      <span class="role-badge" id="role-badge" style="display:none;"></span>
    </div>
    <button class="btn-secondary" id="logout-btn">Ausloggen</button>
  </header>

  <main class="app-main">
    <h1>Flows</h1>
    <p class="intro">Wiederverwendbare, atemgeführte Bewegungsabfolgen (z.B. Sonnengruss), die du beim Erstellen einer Sequenz als Baustein einfügen kannst.</p>

    <div class="filter-bar">
      <input type="text" id="f-search" placeholder="Flow suchen..." />
    </div>

    <div id="admin-actions" style="display:none; margin-bottom: 16px;">
      <a href="flow-form.html"><button class="btn-primary">+ Neuen Flow erstellen</button></a>
    </div>

    <div id="flow-list" class="flow-list"></div>
    <p id="empty-state" class="empty-state" style="display:none;"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function roleLabel(role, gender) {
      if (role === "admin") return "Admin";
      if (role === "therapeut") {
        if (gender === "frau") return "Therapeutin";
        if (gender === "mann") return "Therapeut";
        return "Therapeut:in";
      }
      if (role === "yogi") {
        if (gender === "frau") return "Yogini";
        if (gender === "mann") return "Yogi";
        return "Yogi:ni";
      }
      if (role === "anbieter") {
        if (gender === "frau") return "Anbieterin";
        if (gender === "mann") return "Anbieter";
        return "Anbieter:in";
      }
      return role;
    }

    let allFlows = [];
    let currentUserId = null;
    let currentUserRole = null;

    async function init() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) {
        window.location.href = "index.html";
        return;
      }
      currentUserId = sessionData.session.user.id;

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("role, gender")
        .eq("id", currentUserId)
        .single();

      if (!profile || (profile.role !== "admin" && profile.role !== "therapeut")) {
        alert("Nur Admins und Therapeut:innen haben Zugriff auf Flows.");
        window.location.href = "dashboard.html";
        return;
      }
      currentUserRole = profile.role;

      const badge = document.getElementById("role-badge");
      badge.textContent = roleLabel(profile.role, profile.gender);
      badge.style.display = "inline-block";
        if (profile.role === "anbieter") {
          }
        if (profile.role === "admin") {
          }
        if (profile.role === "therapeut") {
          }
        if (profile.role === "yogi") {
          }
if (profile.role === "therapeut") {
        }
      document.getElementById("admin-actions").style.display = "block";

      await loadFlows();
    }

    async function loadFlows() {
      const { data, error } = await supabaseClient
        .from("flows")
        .select(`
          id, title, description, is_public, created_by,
          flow_items ( id, position, breath_cue, side, asanas ( id, name_deutsch, asana_media ( media_type, storage_path ) ) )
        `)
        .order("created_at", { ascending: false });

      if (error) {
        document.getElementById("empty-state").style.display = "block";
        document.getElementById("empty-state").textContent = "Fehler beim Laden: " + error.message;
        return;
      }

      allFlows = data || [];
      renderList();
    }

    const breathLabels = { einatmen: "Einatmen", ausatmen: "Ausatmen", atem_halten: "Atem halten", kein_bezug: "" };

    function renderFlowRow(flowItems) {
      const sorted = (flowItems || []).slice().sort((a, b) => a.position - b.position);
      if (!sorted.length) return `<p class="muted" style="font-size:13px; color: var(--color-text-muted);">Noch keine Asanas hinzugefügt.</p>`;

      let html = `<div class="flow-row">`;
      sorted.forEach((item, i) => {
        const a = item.asanas;
        const image = a && a.asana_media ? a.asana_media.find(m => m.media_type === "image") : null;
        let thumbHtml;
        if (image) {
          const { data: pub } = supabaseClient.storage.from("asana-media").getPublicUrl(image.storage_path);
          thumbHtml = `<img class="thumb" src="${pub.publicUrl}" alt="${a ? escapeHtml(a.name_deutsch) : ""}" />`;
        } else {
          thumbHtml = `<div class="thumb-placeholder">${a ? escapeHtml(a.name_deutsch) : "?"}</div>`;
        }
        const backParams = `&back=${encodeURIComponent("flows.html")}&backLabel=${encodeURIComponent("Zurück zu Flows")}`;
        html += `<div class="flow-step">
          ${a ? `<a href="asana-detail.html?id=${a.id}${backParams}">${thumbHtml}</a>` : thumbHtml}
          <div class="flow-label">${item.side ? escapeHtml(item.side) : ""}</div>
          <div class="flow-sublabel">${item.breath_cue ? breathLabels[item.breath_cue] || "" : ""}</div>
        </div>`;
        if (i < sorted.length - 1) html += `<div class="flow-arrow">→</div>`;
      });
      html += `</div>`;
      return html;
    }

    function renderList() {
      const search = document.getElementById("f-search").value.trim().toLowerCase();
      const listEl = document.getElementById("flow-list");
      const emptyEl = document.getElementById("empty-state");
      listEl.innerHTML = "";

      const filtered = allFlows.filter(f => {
        if (!search) return true;
        return (f.title + " " + (f.description || "")).toLowerCase().includes(search);
      });

      if (!filtered.length) {
        emptyEl.style.display = "block";
        emptyEl.textContent = "Keine Flows gefunden.";
        return;
      }
      emptyEl.style.display = "none";

      filtered.forEach(f => {
        const card = document.createElement("div");
        card.className = "flow-card";
        const isOwnerOrAdmin = currentUserRole === "admin" || f.created_by === currentUserId;
        card.innerHTML = `
          <div class="name">${escapeHtml(f.title)} ${f.is_public ? `<span class="tag category" style="font-size:11px; vertical-align:middle;">Öffentlich</span>` : ""}</div>
          ${f.description ? `<div class="desc">${escapeHtml(f.description)}</div>` : ""}
          ${renderFlowRow(f.flow_items)}
          ${isOwnerOrAdmin ? `
          <div class="flow-card-actions">
            <a href="flow-form.html?id=${f.id}"><button class="btn-secondary" style="width:100%;">Bearbeiten</button></a>
            <button class="btn-danger" data-delete="${f.id}">Löschen</button>
          </div>
          ` : ""}
        `;
        listEl.appendChild(card);
      });

      listEl.querySelectorAll("[data-delete]").forEach(btn => {
        btn.addEventListener("click", async () => {
          if (!confirm("Diesen Flow wirklich löschen? Bereits in Sequenzen eingefügte Kopien bleiben davon unberührt.")) return;
          const { error } = await supabaseClient.from("flows").delete().eq("id", btn.dataset.delete);
          if (error) {
            alert("Fehler: " + error.message);
            return;
          }
          await loadFlows();
        });
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    document.getElementById("f-search").addEventListener("input", renderList);

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    init();
  </script>
</body>
</html>
