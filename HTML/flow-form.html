<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flow erfassen – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB;
  --color-surface: #FFFFFF;
  --color-pine: #572E2A;
  --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4;
  --color-sand-dark: #C08F84;
  --color-text: #1E2622;
  --color-text-muted: #5B6660;
  --color-border: #DBDFD5;
  --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif;
  --font-script: "Alex Brush", cursive;
  --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
a { color: inherit; }

.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
.nav-links { display: flex; gap: 20px; margin-left: 32px; }
.nav-links a { font-size: 14px; color: var(--color-text-muted); font-weight: 600; text-decoration: none; }
.nav-links a.active, .nav-links a:hover { color: var(--color-pine); }
.header-left { display: flex; align-items: center; }
.role-badge { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--color-sand); color: #fff; margin-left: 10px; }

.btn-primary { padding: 11px 20px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 15px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-secondary { padding: 8px 16px; background: transparent; color: var(--color-pine-dark); border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; text-decoration: none; display: inline-block; }
.btn-icon { padding: 4px 8px; font-size: 13px; background: transparent; border: 1px solid var(--color-border); border-radius: 3px; cursor: pointer; color: var(--color-pine-dark); }
.btn-icon:hover { border-color: var(--color-pine); }

.app-main { padding: 32px; max-width: 760px; margin: 0 auto; }
.app-main h1 { font-family: var(--font-display); color: var(--color-pine-dark); margin-top: 8px; }

.card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 22px 24px; margin-bottom: 18px; }
.card h2 { font-family: var(--font-display); font-size: 16px; color: var(--color-pine-dark); margin: 0 0 14px 0; }

.field { margin-bottom: 16px; }
.field label { display: block; font-size: 13px; color: var(--color-text-muted); margin-bottom: 5px; }
.field input[type=text], .field textarea, .field select { width: 100%; padding: 10px 11px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); background: var(--color-bg); }

.search-row { position: relative; margin-bottom: 16px; }
.search-results { position: absolute; top: 100%; left: 0; right: 0; background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 3px; max-height: 240px; overflow-y: auto; z-index: 10; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
.search-result-item { padding: 10px 12px; cursor: pointer; font-size: 14px; border-bottom: 1px solid var(--color-border); }
.search-result-item:last-child { border-bottom: none; }
.search-result-item:hover { background: var(--color-bg); }

.item-list { display: flex; flex-direction: column; gap: 10px; }
.item-row { border: 1px solid var(--color-border); border-radius: 4px; padding: 14px; }
.item-row-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.item-row-top .name { font-weight: 600; }
.item-controls { display: flex; gap: 4px; }
.item-fields { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 8px; }
.item-fields input, .item-fields select { padding: 8px 9px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 13px; font-family: var(--font-body); background: var(--color-bg); }
.item-notes textarea { width: 100%; padding: 8px 9px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 13px; font-family: var(--font-body); background: var(--color-bg); }

.form-message { font-size: 13px; margin-top: 10px; }
.form-message.error { color: var(--color-error); }
.form-message.success { color: var(--color-pine); }
.empty-hint { color: var(--color-text-muted); font-size: 13px; }

@media (max-width: 640px) {
  .app-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .header-left { flex-wrap: wrap; gap: 8px; }
  .nav-links { margin-left: 0; gap: 14px; }
  .app-main { padding: 20px 16px; }
  .card { padding: 18px 16px; }
  .field input[type=text], .field textarea, .field select { font-size: 16px; }
  .item-fields { grid-template-columns: 1fr; }
  .btn-primary { width: 100%; padding: 14px; font-size: 16px; }
}

.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 44px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) {
  .brand-banner { padding: 8px 16px; }
  .brand-script { font-size: 32px; }
  .brand-serif { font-size: 14px; }
}
  </style>
</head>
<body>
  <div class="brand-banner"><a href="dashboard.html" class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></a></div>
  <header class="app-header">
    <div class="header-left">
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>
        <a href="meine-angaben.html" id="nav-meine-angaben">Meine Angaben</a>
        <a href="selbstdeklaration.html" id="nav-selbstdeklaration" style="display:none;">Selbstdeklaration</a>
        <a href="mein-kontakt.html" id="nav-mein-kontakt" style="display:none;">Mein Kontakt</a>
        <a href="meine-yoginis.html" id="nav-meine-yoginis" style="display:none;">Meine Yogi:nis</a>
        <a href="meine-therapeuten.html" id="nav-meine-therapeuten" style="display:none;">Meine Therapeut:innen</a>
        <a href="dokumentvorlagen.html" id="nav-dokumentvorlagen" style="display:none;">Vorlagen verwalten</a>
        <a href="asanas.html" id="nav-asanas">Asanas</a>
        <a href="sequences.html">Sequenzen</a>
        <a href="flows.html" class="active" id="nav-flows">Flows</a>
        <a href="pranayama.html" id="nav-pranayama">Pranayama</a>
        <a href="mantras.html" id="nav-mantras">Mantras</a>
        <a href="users.html" id="nav-users" style="display:none;">Benutzer</a>
      </nav>
      <span class="role-badge" id="role-badge" style="display:none;"></span>
    </div>
    <button class="btn-secondary" id="logout-btn">Ausloggen</button>
  </header>

  <main class="app-main">
    <a href="flows.html" class="btn-secondary" style="margin-bottom: 10px;">← Zurück zur Übersicht</a>
    <h1 id="page-title">Neuen Flow erstellen</h1>

    <div class="card">
      <h2>Grunddaten</h2>
      <div class="field">
        <label for="title">Titel *</label>
        <input type="text" id="title" placeholder="z.B. Sonnengruss A" />
      </div>
      <div class="field">
        <label for="description">Beschreibung</label>
        <textarea id="description" rows="2" placeholder="Kurze Beschreibung, z.B. Wirkung oder Einsatzgebiet"></textarea>
      </div>
      <label style="display:flex; align-items:center; gap:8px; font-size:14px;">
        <input type="checkbox" id="is-public" />
        Flow öffentlich (für alle Therapeut:innen sichtbar und einfügbar, z.B. Sonnengrüsse)
      </label>
    </div>

    <div class="card">
      <h2>Ablauf</h2>
      <div class="search-row">
        <input type="text" id="asana-search" placeholder="Asana suchen und anklicken, um hinzuzufügen..." autocomplete="off" />
        <div class="search-results" id="search-results" style="display:none;"></div>
      </div>
      <div id="item-list" class="item-list"></div>
      <p class="empty-hint" id="empty-hint">Noch keine Asanas hinzugefügt.</p>
    </div>

    <button class="btn-primary" id="save-btn">Speichern</button>
    <p class="form-message" id="form-message"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function roleLabel(role, gender) {
      if (role === "admin") return "Admin";
      if (role === "therapeut") {
        if (gender === "frau") return "Therapeutin";
        if (gender === "mann") return "Therapeut";
        return "Therapeut:in";
      }
      if (role === "yogi") {
        if (gender === "frau") return "Yogini";
        if (gender === "mann") return "Yogi";
        return "Yogi:ni";
      }
      return role;
    }

    const flowId = new URLSearchParams(window.location.search).get("id");
    let allAsanas = [];
    let items = []; // { asana_id, name_deutsch, breath_cue, hold_duration_override, side, notes }

    async function init() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) {
        window.location.href = "index.html";
        return;
      }

      const { data: profile } = await supabaseClient
        .from("profiles")
        .select("role, gender")
        .eq("id", sessionData.session.user.id)
        .single();

      if (!profile || (profile.role !== "admin" && profile.role !== "therapeut")) {
        alert("Nur Admins und Therapeut:innen können Flows erstellen.");
        window.location.href = "flows.html";
        return;
      }

      const badge = document.getElementById("role-badge");
      badge.textContent = roleLabel(profile.role, profile.gender);
      badge.style.display = "inline-block";
        if (profile.role === "admin") {
          const mt = document.getElementById("nav-meine-therapeuten");
          if (mt) mt.style.display = "inline";
          const dv = document.getElementById("nav-dokumentvorlagen");
          if (dv) dv.style.display = "inline";
        }
        if (profile.role === "therapeut") {
          const sd = document.getElementById("nav-selbstdeklaration");
          if (sd) sd.style.display = "inline";
        }
        if (profile.role === "yogi") {
          const mk = document.getElementById("nav-mein-kontakt");
          if (mk) mk.style.display = "inline";
        }
        if (profile.role !== "admin") {
          const maLink = document.getElementById("nav-meine-angaben");
          if (maLink) {
            maLink.textContent = "Passwort";
            maLink.parentElement.appendChild(maLink);
          }
        }
        if (profile.role !== "admin") {
          ["nav-asanas", "nav-flows", "nav-pranayama", "nav-mantras"].forEach(id => {
            const el = document.getElementById(id);
            if (el) el.style.display = "none";
          });
        }
      document.getElementById("nav-users").style.display = "inline";
      if (profile.role === "therapeut") {
        document.getElementById("nav-meine-yoginis").style.display = "inline";
      }
      const { data: asanas } = await supabaseClient
        .from("asanas")
        .select("id, name_deutsch, hold_duration")
        .order("name_deutsch");
      allAsanas = asanas || [];

      if (flowId) {
        document.getElementById("page-title").textContent = "Flow bearbeiten";
        await loadExistingFlow();
      }

      renderItems();
    }

    async function loadExistingFlow() {
      const { data: flow, error } = await supabaseClient
        .from("flows")
        .select(`
          title, description, is_public,
          flow_items ( position, asana_id, breath_cue, hold_duration_override, side, notes, asanas ( name_deutsch ) )
        `)
        .eq("id", flowId)
        .single();

      if (error || !flow) {
        alert("Flow konnte nicht geladen werden.");
        return;
      }

      document.getElementById("title").value = flow.title || "";
      document.getElementById("description").value = flow.description || "";
      document.getElementById("is-public").checked = !!flow.is_public;

      items = (flow.flow_items || [])
        .slice()
        .sort((a, b) => a.position - b.position)
        .map(i => ({
          asana_id: i.asana_id,
          name_deutsch: i.asanas ? i.asanas.name_deutsch : "(gelöscht)",
          breath_cue: i.breath_cue || "",
          hold_duration_override: i.hold_duration_override || "",
          side: i.side || "",
          notes: i.notes || "",
        }));
    }

    // ------------------------------------------------------------
    // Asana-Suche
    // ------------------------------------------------------------
    const searchInput = document.getElementById("asana-search");
    const resultsEl = document.getElementById("search-results");

    searchInput.addEventListener("input", () => {
      const q = searchInput.value.trim().toLowerCase();
      if (!q) {
        resultsEl.style.display = "none";
        resultsEl.innerHTML = "";
        return;
      }
      const matches = allAsanas.filter(a => a.name_deutsch.toLowerCase().includes(q)).slice(0, 8);
      resultsEl.innerHTML = matches.length
        ? matches.map(a => `<div class="search-result-item" data-id="${a.id}">${escapeHtml(a.name_deutsch)}</div>`).join("")
        : `<div class="search-result-item">Keine Treffer</div>`;
      resultsEl.style.display = "block";
    });

    resultsEl.addEventListener("click", (e) => {
      const item = e.target.closest("[data-id]");
      if (!item) return;
      const asana = allAsanas.find(a => a.id === item.dataset.id);
      if (asana) {
        items.push({
          asana_id: asana.id,
          name_deutsch: asana.name_deutsch,
          breath_cue: "",
          hold_duration_override: "",
          side: "",
          notes: "",
        });
        renderItems();
      }
      searchInput.value = "";
      resultsEl.style.display = "none";
      resultsEl.innerHTML = "";
    });

    document.addEventListener("click", (e) => {
      if (!e.target.closest(".search-row")) {
        resultsEl.style.display = "none";
      }
    });

    // ------------------------------------------------------------
    // Item-Liste rendern
    // ------------------------------------------------------------
    function renderItems() {
      const container = document.getElementById("item-list");
      const hint = document.getElementById("empty-hint");
      container.innerHTML = "";

      if (!items.length) {
        hint.style.display = "block";
        return;
      }
      hint.style.display = "none";

      items.forEach((item, index) => {
        const row = document.createElement("div");
        row.className = "item-row";
        row.innerHTML = `
          <div class="item-row-top">
            <span class="name">${index + 1}. ${escapeHtml(item.name_deutsch)}</span>
            <div class="item-controls">
              <button type="button" class="btn-icon" data-action="up" ${index === 0 ? "disabled" : ""}>↑</button>
              <button type="button" class="btn-icon" data-action="down" ${index === items.length - 1 ? "disabled" : ""}>↓</button>
              <button type="button" class="btn-icon" data-action="remove">✕</button>
            </div>
          </div>
          <div class="item-fields">
            <select data-field="breath_cue">
              <option value="">– Atem –</option>
              <option value="einatmen" ${item.breath_cue === "einatmen" ? "selected" : ""}>Einatmen</option>
              <option value="ausatmen" ${item.breath_cue === "ausatmen" ? "selected" : ""}>Ausatmen</option>
              <option value="atem_halten" ${item.breath_cue === "atem_halten" ? "selected" : ""}>Atem halten</option>
              <option value="kein_bezug" ${item.breath_cue === "kein_bezug" ? "selected" : ""}>Kein Atembezug</option>
            </select>
            <input type="text" data-field="hold_duration_override" placeholder="Haltedauer (optional)" value="${escapeHtml(item.hold_duration_override)}" />
            <select data-field="side">
              <option value="">– Seite –</option>
              <option value="links" ${item.side === "links" ? "selected" : ""}>Links</option>
              <option value="rechts" ${item.side === "rechts" ? "selected" : ""}>Rechts</option>
              <option value="beide" ${item.side === "beide" ? "selected" : ""}>Beide</option>
            </select>
          </div>
          <div class="item-notes">
            <textarea rows="2" data-field="notes" placeholder="Individuelle Hinweise (optional)">${escapeHtml(item.notes)}</textarea>
          </div>
        `;

        row.querySelector('[data-action="up"]').addEventListener("click", () => {
          if (index === 0) return;
          [items[index - 1], items[index]] = [items[index], items[index - 1]];
          renderItems();
        });
        row.querySelector('[data-action="down"]').addEventListener("click", () => {
          if (index === items.length - 1) return;
          [items[index + 1], items[index]] = [items[index], items[index + 1]];
          renderItems();
        });
        row.querySelector('[data-action="remove"]').addEventListener("click", () => {
          items.splice(index, 1);
          renderItems();
        });
        row.querySelector('[data-field="breath_cue"]').addEventListener("change", (e) => {
          items[index].breath_cue = e.target.value;
        });
        row.querySelector('[data-field="hold_duration_override"]').addEventListener("input", (e) => {
          items[index].hold_duration_override = e.target.value;
        });
        row.querySelector('[data-field="side"]').addEventListener("change", (e) => {
          items[index].side = e.target.value;
        });
        row.querySelector('[data-field="notes"]').addEventListener("input", (e) => {
          items[index].notes = e.target.value;
        });

        container.appendChild(row);
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    // ------------------------------------------------------------
    // Speichern
    // ------------------------------------------------------------
    document.getElementById("save-btn").addEventListener("click", async () => {
      const messageEl = document.getElementById("form-message");
      const saveBtn = document.getElementById("save-btn");
      const title = document.getElementById("title").value.trim();

      if (!title) {
        messageEl.textContent = "Bitte einen Titel eingeben.";
        messageEl.className = "form-message error";
        return;
      }

      const { data: sessionCheck } = await supabaseClient.auth.getSession();
      if (!sessionCheck.session) {
        messageEl.textContent = "Deine Sitzung ist abgelaufen. Bitte lade die Seite neu und logg dich erneut ein.";
        messageEl.className = "form-message error";
        return;
      }

      saveBtn.disabled = true;
      messageEl.textContent = "Wird gespeichert …";
      messageEl.className = "form-message";

      const payload = {
        title,
        description: document.getElementById("description").value.trim() || null,
        is_public: document.getElementById("is-public").checked,
        updated_at: new Date().toISOString(),
      };

      let currentId = flowId;

      if (currentId) {
        const { error } = await supabaseClient.from("flows").update(payload).eq("id", currentId);
        if (error) {
          messageEl.textContent = "Fehler: " + error.message;
          messageEl.className = "form-message error";
          saveBtn.disabled = false;
          return;
        }
        await supabaseClient.from("flow_items").delete().eq("flow_id", currentId);
      } else {
        payload.created_by = sessionCheck.session.user.id;
        const { data: inserted, error } = await supabaseClient.from("flows").insert(payload).select("id").single();
        if (error) {
          messageEl.textContent = "Fehler: " + error.message;
          messageEl.className = "form-message error";
          saveBtn.disabled = false;
          return;
        }
        currentId = inserted.id;
      }

      if (items.length) {
        const rows = items.map((item, i) => ({
          flow_id: currentId,
          asana_id: item.asana_id,
          position: i + 1,
          breath_cue: item.breath_cue || null,
          hold_duration_override: item.hold_duration_override || null,
          side: item.side || null,
          notes: item.notes || null,
        }));
        const { error: itemsError } = await supabaseClient.from("flow_items").insert(rows);
        if (itemsError) {
          messageEl.textContent = "Fehler beim Speichern der Asanas: " + itemsError.message;
          messageEl.className = "form-message error";
          saveBtn.disabled = false;
          return;
        }
      }

      messageEl.textContent = "Gespeichert.";
      messageEl.className = "form-message success";
      saveBtn.disabled = false;

      setTimeout(() => { window.location.href = "flows.html"; }, 600);
    });

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    init();
  </script>
</body>
</html>
