<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Yogi:nis – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB; --color-surface: #FFFFFF; --color-pine: #572E2A; --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4; --color-sand-dark: #C08F84; --color-text: #1E2622; --color-text-muted: #5B6660;
  --color-border: #DBDFD5; --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif; --font-script: "Alex Brush", cursive; --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
a { color: inherit; text-decoration: none; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
.nav-links { display: flex; gap: 20px; margin-left: 32px; flex-wrap: wrap; }
.nav-links a { font-size: 14px; color: var(--color-text-muted); font-weight: 600; }
.nav-links a.active, .nav-links a:hover { color: var(--color-pine); }
.header-left { display: flex; align-items: center; flex-wrap: wrap; }
.role-badge { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--color-sand); color: #fff; margin-left: 10px; }
.btn-primary { padding: 10px 18px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 14px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-secondary { padding: 8px 16px; background: transparent; color: var(--color-pine-dark); border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; text-decoration: none; display: inline-block; }
.btn-secondary:hover { border-color: var(--color-pine); }
.btn-toggle { padding: 7px 14px; border-radius: 3px; font-size: 13px; font-family: var(--font-body); font-weight: 600; cursor: pointer; border: 1px solid var(--color-border); background: transparent; color: var(--color-pine-dark); }
.btn-toggle.activate { background: var(--color-sand); color: #fff; border-color: transparent; }
.btn-toggle.activate:hover { background: var(--color-sand-dark); }
.btn-toggle.deactivate:hover { border-color: var(--color-error); color: var(--color-error); }
.app-main { padding: 32px; max-width: 900px; margin: 0 auto; }
.app-main h1 { font-family: var(--font-display); color: var(--color-pine-dark); margin-top: 0; }
.app-main > p.intro { color: var(--color-text-muted); font-size: 14px; margin-top: -10px; margin-bottom: 24px; }
.invite-box { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 16px 18px; margin-bottom: 20px; font-size: 14px; }
.invite-box .link-row { display: flex; gap: 8px; align-items: center; margin-top: 8px; flex-wrap: wrap; }
.invite-box input { flex: 1; min-width: 200px; padding: 8px 10px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 13px; font-family: var(--font-body); background: var(--color-bg); }
.filter-bar { margin-bottom: 20px; }
.filter-bar input { width: 100%; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); background: var(--color-surface); }
.yogini-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 18px 20px; margin-bottom: 14px; }
.yogini-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
.yogini-name { font-family: var(--font-display); font-size: 19px; color: var(--color-pine-dark); }
.yogini-email { font-size: 12px; color: var(--color-text-muted); }
.status-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px; }
.status-badge.active { background: rgba(87,46,42,0.08); color: var(--color-pine); }
.form-message { font-size: 13px; }
.form-message.error { color: var(--color-error); }
.form-message.success { color: var(--color-pine); }
.status-badge.inactive { background: rgba(192,143,132,0.18); color: var(--color-sand-dark); }
.yogini-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border); }
.yogini-section-title { font-size: 12px; color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
.access-row label { display: inline-flex; align-items: center; gap: 5px; font-size: 13px; margin-right: 14px; }
.sequence-list { display: flex; flex-wrap: wrap; gap: 8px; }
.sequence-list a { font-size: 13px; padding: 6px 12px; background: var(--color-bg); border-radius: 3px; border: 1px solid var(--color-border); }
.sequence-list a:hover { border-color: var(--color-pine); }
.action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
.empty-state { color: var(--color-text-muted); padding: 40px 0; text-align: center; }
@media (max-width: 640px) {
  .app-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .nav-links { margin-left: 0; gap: 14px; }
  .app-main { padding: 20px 16px; }
  .yogini-top { flex-direction: column; }
}
.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 44px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) { .brand-banner { padding: 8px 16px; } .brand-script { font-size: 32px; } .brand-serif { font-size: 14px; } }
  </style>
</head>
<body>
  <div class="brand-banner"><a href="dashboard.html" class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></a></div>
  <header class="app-header">
    <div class="header-left">
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>

        <a href="verwaltung.html" id="nav-verwaltung" style="display:none;">Verwaltung</a>
        <a href="users.html" id="nav-users" style="display:none;">Benutzer</a>
      </nav>
      <span class="role-badge" id="role-badge" style="display:none;"></span>
    </div>
    <button class="btn-secondary" id="logout-btn">Ausloggen</button>
  </header>

  <main class="app-main">
    <h1>Meine Yogi:nis</h1>
    <p class="intro">Die dir zugewiesenen und mit dir geteilten Yogi:nis, mit direktem Zugriff auf Akte, Freigaben und zugewiesene Sequenzen.</p>

    <div class="invite-box">
      <strong>Neue Yogi:ni erstellen</strong>
      <div class="link-row" style="margin-top:10px;">
        <input type="email" id="new-user-email" placeholder="E-Mail-Adresse" />
        <button class="btn-primary" id="create-user-btn" type="button">Erstellen</button>
      </div>
      <p class="form-message" id="create-user-message" style="margin-top:8px;"></p>
    </div>

    <div class="filter-bar">
      <input type="text" id="f-search" placeholder="Yogi:ni suchen..." />
    </div>

    <div id="yogini-list"></div>
    <p id="empty-state" class="empty-state" style="display:none;"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function roleLabel(role, gender) {
      if (role === "admin") return "Admin";
      if (role === "therapeut") {
        if (gender === "frau") return "Therapeutin";
        if (gender === "mann") return "Therapeut";
        return "Therapeut:in";
      }
      if (role === "yogi") {
        if (gender === "frau") return "Yogini";
        if (gender === "mann") return "Yogi";
        return "Yogi:ni";
      }
      if (role === "anbieter") {
        if (gender === "frau") return "Anbieterin";
        if (gender === "mann") return "Anbieter";
        return "Anbieter:in";
      }
      return role;
    }

    let currentUserId = null;
    let allYoginis = [];

    async function init() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) { window.location.href = "index.html"; return; }
      currentUserId = sessionData.session.user.id;

      const { data: profile } = await supabaseClient.from("profiles").select("role, gender").eq("id", currentUserId).single();
      if (!profile || profile.role !== "therapeut") {
        alert("Diese Seite ist nur für Therapeut:innen.");
        window.location.href = "dashboard.html";
        return;
      }

      const badge = document.getElementById("role-badge");
      badge.textContent = roleLabel(profile.role, profile.gender);
      badge.style.display = "inline-block";
        if (profile.role === "admin" || profile.role === "therapeut") {
          const nv = document.getElementById("nav-verwaltung");
          if (nv) nv.style.display = "inline";
        }
        if (profile.role === "admin") {
          const nu = document.getElementById("nav-users");
          if (nu) nu.style.display = "inline";
        }
        if (profile.role === "anbieter") {
          }
        if (profile.role === "therapeut") {
          }
        if (profile.role === "yogi") {
          }
document.getElementById("create-user-btn").addEventListener("click", createNewYogini);

      await loadYoginis();
    }

    async function createNewYogini() {
      const emailInput = document.getElementById("new-user-email");
      const msgEl = document.getElementById("create-user-message");
      const btn = document.getElementById("create-user-btn");
      const email = emailInput.value.trim();

      if (!email) {
        msgEl.textContent = "Bitte eine E-Mail-Adresse eingeben.";
        msgEl.className = "form-message error";
        return;
      }

      btn.disabled = true;
      msgEl.textContent = "Wird erstellt …";
      msgEl.className = "form-message";

      const tempClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: { persistSession: false, autoRefreshToken: false, storageKey: "temp-signup-client" },
      });
      const randomPassword = crypto.randomUUID() + "Aa1!";

      const { data: signUpData, error: signUpError } = await tempClient.auth.signUp({
        email,
        password: randomPassword,
        options: { data: { assigned_therapist_id: currentUserId } },
      });

      if (signUpError) {
        msgEl.textContent = "Fehler: " + signUpError.message;
        msgEl.className = "form-message error";
        btn.disabled = false;
        return;
      }

      const newUserId = signUpData.user ? signUpData.user.id : null;
      if (!newUserId) {
        msgEl.textContent = "Konto konnte nicht erstellt werden.";
        msgEl.className = "form-message error";
        btn.disabled = false;
        return;
      }

      const { error: updateError } = await supabaseClient.from("profiles").update({ active: true }).eq("id", newUserId);
      if (updateError) {
        msgEl.textContent = "Konto erstellt, aber Freischaltung fehlgeschlagen: " + updateError.message;
        msgEl.className = "form-message error";
        btn.disabled = false;
        return;
      }

      // E-Mail mit direktem Link zum Passwort-Setzen verschicken (statt nur Bestätigung)
      await supabaseClient.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + "/reset-password.html",
      });

      msgEl.textContent = `Konto für ${email} erstellt und aktiviert. Die Person erhält eine E-Mail mit einem Link, um direkt ihr eigenes Passwort zu setzen.`;
      msgEl.className = "form-message success";
      emailInput.value = "";
      btn.disabled = false;
      await loadYoginis();
    }

    async function loadYoginis() {
      // Dank RLS liefert diese Abfrage automatisch nur die zugewiesenen/geteilten Yoginis
      const { data: yoginis, error } = await supabaseClient
        .from("profiles")
        .select("id, email, first_name, last_name, gender, active, active_until, created_at")
        .eq("role", "yogi")
        .order("created_at");

      if (error) {
        document.getElementById("empty-state").style.display = "block";
        document.getElementById("empty-state").textContent = "Fehler beim Laden: " + error.message;
        return;
      }
      if (!yoginis || !yoginis.length) {
        document.getElementById("empty-state").style.display = "block";
        document.getElementById("empty-state").textContent = "Dir sind aktuell keine Yogi:nis zugewiesen.";
        return;
      }

      const yogiIds = yoginis.map(y => y.id);

      const [{ data: accessRows }, { data: assignmentRows }] = await Promise.all([
        supabaseClient.from("content_access").select("yogi_id, content_type, granted").in("yogi_id", yogiIds),
        supabaseClient.from("sequence_assignments").select("yogi_id, asana_sequences ( id, title )").in("yogi_id", yogiIds),
      ]);

      const accessByYogi = {};
      (accessRows || []).forEach(r => {
        if (!accessByYogi[r.yogi_id]) accessByYogi[r.yogi_id] = {};
        accessByYogi[r.yogi_id][r.content_type] = r.granted;
      });

      const sequencesByYogi = {};
      (assignmentRows || []).forEach(r => {
        if (!r.asana_sequences) return;
        if (!sequencesByYogi[r.yogi_id]) sequencesByYogi[r.yogi_id] = [];
        sequencesByYogi[r.yogi_id].push(r.asana_sequences);
      });

      allYoginis = yoginis.map(y => ({
        ...y,
        access: accessByYogi[y.id] || {},
        sequences: sequencesByYogi[y.id] || [],
      }));

      renderList();
    }

    function displayName(y) {
      const parts = [y.first_name, y.last_name].filter(Boolean);
      return parts.length ? parts.join(" ") : y.email;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    function renderList() {
      const search = document.getElementById("f-search").value.trim().toLowerCase();
      const listEl = document.getElementById("yogini-list");
      const emptyEl = document.getElementById("empty-state");
      listEl.innerHTML = "";

      const filtered = allYoginis.filter(y => displayName(y).toLowerCase().includes(search) || y.email.toLowerCase().includes(search));

      if (!filtered.length) {
        emptyEl.style.display = "block";
        emptyEl.textContent = "Keine passenden Yogi:nis gefunden.";
        return;
      }
      emptyEl.style.display = "none";

      filtered.forEach(y => {
        const isCurrentlyActive = y.active && (!y.active_until || new Date(y.active_until) > new Date());
        const card = document.createElement("div");
        card.className = "yogini-card";

        const sequenceListHtml = y.sequences.length
          ? `<div class="sequence-list">${y.sequences.map(s => `<a href="sequence-detail.html?id=${s.id}">${escapeHtml(s.title)}</a>`).join("")}</div>`
          : `<p style="font-size:13px; color: var(--color-text-muted); margin:0;">Keine zugewiesenen Sequenzen (aus deiner eigenen Erstellung sichtbar).</p>`;

        card.innerHTML = `
          <div class="yogini-top">
            <div>
              <div class="yogini-name">${escapeHtml(displayName(y))}</div>
              <div class="yogini-email">${escapeHtml(y.email)}</div>
            </div>
            <span class="status-badge ${isCurrentlyActive ? "active" : "inactive"}">${isCurrentlyActive ? "Aktiv" : "Inaktiv"}</span>
          </div>

          <div class="yogini-section">
            <div class="yogini-section-title">Geschlecht</div>
            <select data-role="gender" style="padding:6px 8px; font-size:13px; border:1px solid var(--color-border); border-radius:3px; background: var(--color-bg);">
              <option value="" ${!y.gender ? "selected" : ""}>– nicht angegeben –</option>
              <option value="frau" ${y.gender === "frau" ? "selected" : ""}>Frau</option>
              <option value="mann" ${y.gender === "mann" ? "selected" : ""}>Mann</option>
              <option value="nicht-binär" ${y.gender === "nicht-binär" ? "selected" : ""}>Nicht-binär</option>
            </select>
          </div>

          <div class="yogini-section">
            <div class="yogini-section-title">Datenbank-Freigaben</div>
            <div class="access-row">
              <label><input type="checkbox" data-access="asanas" ${y.access.asanas ? "checked" : ""} /> Asanas</label>
              <label><input type="checkbox" data-access="pranayama" ${y.access.pranayama ? "checked" : ""} /> Pranayama</label>
              <label><input type="checkbox" data-access="mantras" ${y.access.mantras ? "checked" : ""} /> Mantras</label>
            </div>
          </div>

          <div class="yogini-section">
            <div class="yogini-section-title">Zugewiesene Sequenzen</div>
            ${sequenceListHtml}
          </div>

          <div class="action-row">
            <a href="client-file.html?id=${y.id}" class="btn-secondary">Benutzerakte öffnen</a>
            <a href="sequences.html" class="btn-secondary">Sequenz zuweisen</a>
            <button class="btn-toggle ${isCurrentlyActive ? "deactivate" : "activate"}" data-action="toggle-active">
              ${isCurrentlyActive ? "Deaktivieren" : "Aktivieren"}
            </button>
          </div>
        `;

        card.querySelectorAll("[data-access]").forEach(cb => {
          cb.addEventListener("change", async () => {
            const { error } = await supabaseClient.from("content_access").upsert({
              yogi_id: y.id,
              content_type: cb.dataset.access,
              granted: cb.checked,
              granted_by: currentUserId,
              updated_at: new Date().toISOString(),
            }, { onConflict: "yogi_id,content_type" });
            if (error) {
              alert("Fehler: " + error.message);
              cb.checked = !cb.checked;
            }
          });
        });

        const genderSelect = card.querySelector('[data-role="gender"]');
        genderSelect.addEventListener("change", async () => {
          const { error } = await supabaseClient.from("profiles").update({ gender: genderSelect.value || null }).eq("id", y.id);
          if (error) alert("Fehler: " + error.message);
        });

        const toggleBtn = card.querySelector('[data-action="toggle-active"]');
        toggleBtn.addEventListener("click", async () => {
          toggleBtn.disabled = true;
          const { error } = await supabaseClient.from("profiles").update({ active: !isCurrentlyActive }).eq("id", y.id);
          if (error) {
            alert("Fehler: " + error.message);
            toggleBtn.disabled = false;
            return;
          }
          await loadYoginis();
        });

        listEl.appendChild(card);
      });
    }

    document.getElementById("f-search").addEventListener("input", renderList);

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    init();
  </script>
</body>
</html>
