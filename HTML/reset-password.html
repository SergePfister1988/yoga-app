<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neues Passwort – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB; --color-surface: #FFFFFF; --color-pine: #572E2A; --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4; --color-sand-dark: #C08F84; --color-text: #1E2622; --color-text-muted: #5B6660;
  --color-border: #DBDFD5; --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif; --font-script: "Alex Brush", cursive; --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
.auth-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }
.auth-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 40px; width: 100%; max-width: 380px; box-shadow: 0 1px 2px rgba(30,38,34,0.04); }
.auth-title { font-family: var(--font-display); font-size: 26px; color: var(--color-pine-dark); margin: 0 0 24px 0; }
.field { margin-bottom: 18px; }
.field label { display: block; font-size: 13px; color: var(--color-text-muted); margin-bottom: 6px; }
.field input { width: 100%; padding: 11px 12px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 16px; font-family: var(--font-body); background: var(--color-bg); }
.btn-primary { width: 100%; padding: 12px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 15px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-primary:disabled { opacity: 0.6; }
.form-message { font-size: 13px; margin-top: 14px; line-height: 1.5; }
.form-message.error { color: var(--color-error); }
.form-message.success { color: var(--color-pine); }
.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 14px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 54px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 22px; color: var(--color-pine-dark); margin-top: -6px; }
  </style>
</head>
<body>
  <div class="brand-banner"><div class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></div></div>
  <div class="auth-screen">
    <div class="auth-card">
      <h1 class="auth-title">Neues Passwort setzen</h1>

      <div id="waiting-message" style="font-size:14px; color: var(--color-text-muted);">Link wird geprüft …</div>

      <form id="reset-form" novalidate style="display:none;">
        <div class="field">
          <label for="password">Neues Passwort</label>
          <input type="password" id="password" required minlength="6" autocomplete="new-password" />
        </div>
        <div class="field">
          <label for="password2">Passwort bestätigen</label>
          <input type="password" id="password2" required minlength="6" autocomplete="new-password" />
        </div>
        <button type="submit" class="btn-primary" id="save-btn">Passwort speichern</button>
      </form>

      <p class="form-message" id="form-message"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const messageEl = document.getElementById("form-message");
    let recoveryReady = false;

    supabaseClient.auth.onAuthStateChange((event, session) => {
      if (event === "PASSWORD_RECOVERY") {
        recoveryReady = true;
        document.getElementById("waiting-message").style.display = "none";
        document.getElementById("reset-form").style.display = "block";
      }
    });

    // Falls der Link schon vor dem Event-Listener verarbeitet wurde
    setTimeout(async () => {
      if (recoveryReady) return;
      const { data } = await supabaseClient.auth.getSession();
      if (data.session) {
        document.getElementById("waiting-message").style.display = "none";
        document.getElementById("reset-form").style.display = "block";
      } else {
        document.getElementById("waiting-message").textContent =
          "Dieser Link ist ungültig oder abgelaufen. Bitte fordere über 'Passwort vergessen?' auf der Login-Seite einen neuen Link an.";
      }
    }, 2500);

    document.getElementById("reset-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const password2 = document.getElementById("password2").value;
      const saveBtn = document.getElementById("save-btn");

      if (password !== password2) {
        messageEl.textContent = "Die Passwörter stimmen nicht überein.";
        messageEl.className = "form-message error";
        return;
      }
      if (password.length < 6) {
        messageEl.textContent = "Das Passwort muss mindestens 6 Zeichen lang sein.";
        messageEl.className = "form-message error";
        return;
      }

      saveBtn.disabled = true;
      const { error } = await supabaseClient.auth.updateUser({ password });

      if (error) {
        messageEl.textContent = "Fehler: " + error.message;
        messageEl.className = "form-message error";
        saveBtn.disabled = false;
        return;
      }

      messageEl.textContent = "Passwort gespeichert. Du wirst weitergeleitet …";
      messageEl.className = "form-message success";
      setTimeout(() => { window.location.href = "dashboard.html"; }, 1200);
    });
  </script>
</body>
</html>
