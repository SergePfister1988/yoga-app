<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mantras – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB; --color-surface: #FFFFFF; --color-pine: #572E2A; --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4; --color-sand-dark: #C08F84; --color-text: #1E2622; --color-text-muted: #5B6660;
  --color-border: #DBDFD5; --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif; --font-script: "Alex Brush", cursive; --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
a { color: inherit; text-decoration: none; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
.nav-links { display: flex; gap: 20px; margin-left: 32px; flex-wrap: wrap; }
.nav-links a { font-size: 14px; color: var(--color-text-muted); font-weight: 600; }
.nav-links a.active, .nav-links a:hover { color: var(--color-pine); }
.header-left { display: flex; align-items: center; flex-wrap: wrap; }
.role-badge { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--color-sand); color: #fff; margin-left: 10px; }
.btn-primary { padding: 10px 18px; background: var(--color-sand); color: #fff; border: none; border-radius: 3px; font-size: 14px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-primary:hover { background: var(--color-sand-dark); }
.btn-secondary { padding: 8px 16px; background: transparent; color: var(--color-pine-dark); border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; }
.btn-secondary:hover { border-color: var(--color-pine); }
.app-main { padding: 32px; max-width: 1000px; margin: 0 auto; }
.app-main h1 { font-family: var(--font-display); color: var(--color-pine-dark); margin-top: 0; }
.filter-bar { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 20px; display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
.filter-field label { display: block; font-size: 12px; color: var(--color-text-muted); margin-bottom: 5px; }
.filter-field input, .filter-field select { width: 100%; padding: 9px 10px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); background: var(--color-bg); }
.asana-list { display: flex; flex-direction: column; gap: 8px; }
.simple-list-row { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.simple-list-row:hover { border-color: var(--color-pine); }
.simple-list-link { font-family: var(--font-display); font-size: 17px; color: var(--color-pine-dark); text-decoration: none; }
.simple-list-actions { display: flex; gap: 8px; }
.btn-status { padding: 7px 12px; background: transparent; border: 1.5px solid; border-radius: 3px; font-size: 12px; font-family: var(--font-body); font-weight: 600; cursor: pointer; }
.btn-status.status-done { border-color: #3A7D44; color: #3A7D44; }
.btn-status.status-done:hover { background: rgba(58,125,68,0.08); }
.btn-status.status-pending { border-color: var(--color-error, #A6483A); color: var(--color-error, #A6483A); }
.btn-status.status-pending:hover { background: rgba(166,72,58,0.08); }
.asana-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 18px; display: block; }
.asana-card:hover { border-color: var(--color-pine); }
.asana-card .sanskrit { font-size: 12px; color: var(--color-text-muted); }
.asana-card .name { font-family: var(--font-display); font-size: 19px; color: var(--color-pine-dark); margin: 2px 0 10px 0; }
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; }
.tag { font-size: 11px; padding: 3px 8px; border-radius: 12px; background: var(--color-bg); border: 1px solid var(--color-border); color: var(--color-text-muted); }
.tag.category { background: var(--color-pine-dark); color: #fff; }
.tag.reviewed { background: rgba(87,46,42,0.08); color: var(--color-pine); border-color: transparent; font-weight: 600; }
.tag.unreviewed { background: rgba(192,143,132,0.15); color: var(--color-sand-dark); border-color: transparent; }
.empty-state { color: var(--color-text-muted); padding: 40px 0; text-align: center; }
.form-message.error { color: var(--color-error); }
.form-message.success { color: var(--color-pine); }
@media (max-width: 640px) {
  .app-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .nav-links { margin-left: 0; gap: 14px; }
  .app-main { padding: 20px 16px; }
  .filter-bar { grid-template-columns: 1fr; }
  .filter-field input, .filter-field select { font-size: 16px; }
  .simple-list-row { flex-direction: column; align-items: flex-start; }
  #admin-actions .btn-primary { width: 100%; padding: 13px; }
}
.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 44px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) { .brand-banner { padding: 8px 16px; } .brand-script { font-size: 32px; } .brand-serif { font-size: 14px; } }
  </style>
</head>
<body>
  <div class="brand-banner"><a href="dashboard.html" class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></a></div>
  <header class="app-header">
    <div class="header-left">
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>

        <a href="verwaltung.html" id="nav-verwaltung" style="display:none;">Verwaltung</a>
        <a href="users.html" id="nav-users" style="display:none;">Benutzer</a>
      </nav>
      <span class="role-badge" id="role-badge" style="display:none;"></span>
    </div>
    <button class="btn-secondary" id="logout-btn">Ausloggen</button>
  </header>

  <main class="app-main">
    <h1>Mantra-Datenbank</h1>

    <div class="filter-bar">
      <div class="filter-field">
        <label for="f-search">Suche (Name)</label>
        <input type="text" id="f-search" placeholder="z.B. Gayatri..." />
      </div>
      <div class="filter-field">
        <label for="f-category">Kategorie</label>
        <select id="f-category"><option value="">Alle</option></select>
      </div>
      <div class="filter-field" id="f-reviewed-field" style="display:none;">
        <label for="f-reviewed">Erfasst</label>
        <select id="f-reviewed">
          <option value="">Alle</option>
          <option value="yes">Nur erfasste</option>
          <option value="no">Nur nicht erfasste</option>
        </select>
      </div>
      <div class="filter-field" id="f-verified-field" style="display:none;">
        <label for="f-verified">Geprüft</label>
        <select id="f-verified">
          <option value="">Alle</option>
          <option value="yes">Nur geprüfte</option>
          <option value="no">Nur nicht geprüfte</option>
        </select>
      </div>
    </div>

    <div id="admin-actions" style="display:none; margin-bottom: 16px; gap: 10px; flex-wrap: wrap;">
      <a href="mantra-form.html"><button class="btn-primary">+ Neues Mantra erfassen</button></a>
      <button class="btn-primary" id="export-toggle-btn" type="button">Singkreisblatt exportieren</button>
      <button class="btn-primary" id="export-csv-btn">CSV Exportieren</button>
      <button class="btn-primary" id="create-backup-btn">Backup erstellen</button>
      <button class="btn-primary" id="restore-backup-btn">Backup restoren</button>
      <input type="file" id="restore-file-input" accept="application/json" style="display:none;" />
    </div>
    <p class="form-status" id="backup-status" style="font-size:13px; color: var(--color-text-muted); margin-top:-10px; margin-bottom:16px;"></p>

    <div id="export-panel" class="card" style="display:none; margin-bottom:20px;">
      <h2 style="font-family: var(--font-display); font-size:17px; color: var(--color-pine-dark); margin-top:0;">Mantras exportieren</h2>
      <p style="font-size:13px; color: var(--color-text-muted); margin-bottom:14px;">Wähle die Mantras aus, die du als Word-Dokument exportieren möchtest.</p>
      <div id="export-checklist" style="display:flex; flex-direction:column; gap:8px; margin-bottom:16px;"></div>
      <button class="btn-primary" id="export-run-btn" type="button">Ausgewählte exportieren (.docx)</button>
      <p class="form-message" id="export-status" style="font-size:13px; margin-top:10px;"></p>
    </div>

    <div id="asana-list" class="asana-list"></div>
    <p id="empty-state" class="empty-state" style="display:none;"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.umd.min.js"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function roleLabel(role, gender) {
      if (role === "admin") return "Admin";
      if (role === "therapeut") {
        if (gender === "frau") return "Therapeutin";
        if (gender === "mann") return "Therapeut";
        return "Therapeut:in";
      }
      if (role === "yogi") {
        if (gender === "frau") return "Yogini";
        if (gender === "mann") return "Yogi";
        return "Yogi:ni";
      }
      if (role === "anbieter") {
        if (gender === "frau") return "Anbieterin";
        if (gender === "mann") return "Anbieter";
        return "Anbieter:in";
      }
      return role;
    }

    let allItems = [];
    let isAdmin = false;

    async function init() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) { window.location.href = "index.html"; return; }

      const { data: profile } = await supabaseClient.from("profiles").select("role, gender").eq("id", sessionData.session.user.id).single();
      if (profile) {
        const badge = document.getElementById("role-badge");
        badge.textContent = roleLabel(profile.role, profile.gender);
        badge.style.display = "inline-block";
        if (profile.role === "admin" || profile.role === "therapeut") {
          const nv = document.getElementById("nav-verwaltung");
          if (nv) nv.style.display = "inline";
        }
        if (profile.role === "admin") {
          const nu = document.getElementById("nav-users");
          if (nu) nu.style.display = "inline";
        }
        if (profile.role === "anbieter") {
          }
        if (profile.role === "admin") {
          }
        if (profile.role === "therapeut") {
          }
        if (profile.role === "yogi") {
          }
isAdmin = profile.role === "admin";
        if (profile.role === "admin" || profile.role === "therapeut") {
          if (profile.role === "therapeut") {
            }
        }
        if (isAdmin) {
          document.getElementById("admin-actions").style.display = "flex";
          document.getElementById("f-reviewed-field").style.display = "block";
          document.getElementById("f-verified-field").style.display = "block";
        }
      }

      await loadCategories();
      await loadItems();
    }

    async function loadCategories() {
      const { data } = await supabaseClient.from("mantra_categories").select("id, name").order("sort_order");
      const sel = document.getElementById("f-category");
      (data || []).forEach(c => {
        const opt = document.createElement("option");
        opt.value = c.id; opt.textContent = c.name;
        sel.appendChild(opt);
      });
    }

    async function loadItems() {
      const { data, error } = await supabaseClient
        .from("mantras")
        .select(`
          id, name_deutsch, author, reviewed, verified,
          mantra_category_links ( mantra_categories ( id, name ) )
        `)
        .order("name_deutsch");

      if (error) {
        document.getElementById("empty-state").style.display = "block";
        document.getElementById("empty-state").textContent = "Fehler beim Laden: " + error.message;
        return;
      }
      allItems = data || [];
      renderList();
    }

    function renderList() {
      const search = document.getElementById("f-search").value.trim().toLowerCase();
      const categoryId = document.getElementById("f-category").value;
      const reviewedFilter = document.getElementById("f-reviewed").value;
      const verifiedFilter = document.getElementById("f-verified").value;

      const filtered = allItems.filter(a => {
        if (search) {
          const haystack = (a.name_deutsch + " " + (a.author || "")).toLowerCase();
          if (!haystack.includes(search)) return false;
        }
        if (categoryId) {
          const has = (a.mantra_category_links || []).some(cl => cl.mantra_categories && cl.mantra_categories.id === categoryId);
          if (!has) return false;
        }
        if (reviewedFilter === "yes" && !a.reviewed) return false;
        if (reviewedFilter === "no" && a.reviewed) return false;
        if (verifiedFilter === "yes" && !a.verified) return false;
        if (verifiedFilter === "no" && a.verified) return false;
        return true;
      });

      const listEl = document.getElementById("asana-list");
      const emptyEl = document.getElementById("empty-state");
      listEl.innerHTML = "";

      if (!filtered.length) {
        emptyEl.style.display = "block";
        emptyEl.textContent = "Keine Mantras gefunden.";
        return;
      }
      emptyEl.style.display = "none";

      filtered.forEach(a => {
        const row = document.createElement("div");
        row.className = "simple-list-row";

        let html = `<a href="mantra-detail.html?id=${a.id}" class="simple-list-link">${escapeHtml(a.name_deutsch)}</a>`;
        if (isAdmin) {
          html += `<div class="simple-list-actions">
            <button type="button" class="btn-status ${a.reviewed ? "status-done" : "status-pending"}" data-action="toggle-reviewed">Erfasst ${a.reviewed ? "✓" : "✗"}</button>
            <button type="button" class="btn-status ${a.verified ? "status-done" : "status-pending"}" data-action="toggle-verified">Geprüft ${a.verified ? "✓" : "✗"}</button>
          </div>`;
        }
        row.innerHTML = html;
        listEl.appendChild(row);

        if (isAdmin) {
          row.querySelector('[data-action="toggle-reviewed"]').addEventListener("click", async (e) => {
            e.preventDefault();
            const btn = e.target;
            btn.disabled = true;
            const { data: sessionData } = await supabaseClient.auth.getSession();
            const payload = a.reviewed
              ? { reviewed: false, reviewed_by: null, reviewed_at: null }
              : { reviewed: true, reviewed_by: sessionData.session.user.id, reviewed_at: new Date().toISOString() };
            const { error } = await supabaseClient.from("mantras").update(payload).eq("id", a.id);
            if (error) { alert("Fehler: " + error.message); btn.disabled = false; return; }
            await loadItems();
          });
          row.querySelector('[data-action="toggle-verified"]').addEventListener("click", async (e) => {
            e.preventDefault();
            const btn = e.target;
            btn.disabled = true;
            const { data: sessionData } = await supabaseClient.auth.getSession();
            const payload = a.verified
              ? { verified: false, verified_by: null, verified_at: null }
              : { verified: true, verified_by: sessionData.session.user.id, verified_at: new Date().toISOString() };
            const { error } = await supabaseClient.from("mantras").update(payload).eq("id", a.id);
            if (error) { alert("Fehler: " + error.message); btn.disabled = false; return; }
            await loadItems();
          });
        }
      });
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    ["f-search", "f-category", "f-reviewed", "f-verified"].forEach(id => {
      document.getElementById(id).addEventListener("input", renderList);
      document.getElementById(id).addEventListener("change", renderList);
    });

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    // ------------------------------------------------------------
    // Akkorde transponieren (gleiche Logik wie in mantra-detail.html)
    // ------------------------------------------------------------
    const NOTE_TO_INDEX = { C:0, Cis:1, Des:1, D:2, Dis:3, Es:3, E:4, F:5, Fis:6, Ges:6, G:7, Gis:8, As:8, A:9, Ais:10, B:10, H:11 };
    const INDEX_TO_NOTE = ["C","C#","D","D#","E","F","F#","G","G#","A","B","H"];
    const CHORD_SUFFIXES = "maj7|dim|aug|sus2|sus4|add9|6|7|9|11|13";
    const chordTokenRegex = new RegExp(`^([a-hA-H])(is|es|IS|ES|#)?(m)?(${CHORD_SUFFIXES})?(?:\\/([a-hA-H])(is|es|IS|ES|#)?(m)?)?$`);

    function noteIndex(letter, mod) {
      let normalized = mod ? mod.toLowerCase() : "";
      if (normalized === "#") normalized = "is";
      return NOTE_TO_INDEX[letter.toUpperCase() + normalized];
    }

    function transposeToken(token, shift) {
      const m = token.match(chordTokenRegex);
      if (!m) return null;
      const [, letter, mod, minor, suffix, bassLetter, bassMod] = m;
      const idx = noteIndex(letter, mod);
      if (idx === undefined) return null;
      const newIdx = ((idx + shift) % 12 + 12) % 12;
      let result = INDEX_TO_NOTE[newIdx] + (minor || "") + (suffix || "");
      if (bassLetter) {
        const bIdx = noteIndex(bassLetter, bassMod);
        if (bIdx !== undefined) result += "/" + INDEX_TO_NOTE[((bIdx + shift) % 12 + 12) % 12];
      }
      return result;
    }

    function transposeMantraText(text, shift) {
      if (!shift) return text;
      return text.split("\n").map(line => {
        if (!line.trim()) return line;
        const tokenRegex = /\S+/g;
        let match;
        const tokens = [];
        while ((match = tokenRegex.exec(line)) !== null) tokens.push({ text: match[0], index: match.index });
        if (!tokens.length) return line;
        const transposed = tokens.map(t => transposeToken(t.text, shift));
        if (transposed.some(t => t === null)) return line;
        let result = "", cursor = 0;
        tokens.forEach((t, i) => {
          result += line.slice(cursor, t.index);
          result += transposed[i];
          cursor = t.index + t.text.length;
        });
        result += line.slice(cursor);
        return result;
      }).join("\n");
    }

    function extractChordProgression(text, shift) {
      const chords = [];
      text.split("\n").forEach(line => {
        if (!line.trim()) return;
        const tokens = line.trim().split(/\s+/);
        const transposed = tokens.map(t => transposeToken(t, shift));
        if (transposed.some(t => t === null)) return; // keine reine Akkordzeile
        chords.push(...transposed);
      });
      return chords;
    }

    // ------------------------------------------------------------
    // Export als Word-Dokument
    // ------------------------------------------------------------
    document.getElementById("export-toggle-btn").addEventListener("click", () => {
      const panel = document.getElementById("export-panel");
      const checklist = document.getElementById("export-checklist");
      const showing = panel.style.display === "block";
      if (showing) {
        panel.style.display = "none";
        return;
      }
      checklist.innerHTML = "";
      allItems.slice().sort((a, b) => a.name_deutsch.localeCompare(b.name_deutsch, "de")).forEach(m => {
        const row = document.createElement("label");
        row.style.cssText = "display:flex; align-items:center; gap:8px; font-size:14px;";
        row.innerHTML = `<input type="checkbox" value="${m.id}" /> ${escapeHtml(m.name_deutsch)}`;
        checklist.appendChild(row);
      });
      panel.style.display = "block";
    });

    document.getElementById("export-run-btn").addEventListener("click", async () => {
      const statusEl = document.getElementById("export-status");
      const selectedIds = Array.from(document.querySelectorAll("#export-checklist input:checked")).map(cb => cb.value);

      if (!selectedIds.length) {
        statusEl.textContent = "Bitte mindestens ein Mantra auswählen.";
        statusEl.className = "form-message error";
        return;
      }
      if (!window.docx) {
        statusEl.textContent = "Die Word-Bibliothek konnte nicht geladen werden. Bitte Seite neu laden und erneut versuchen.";
        statusEl.className = "form-message error";
        return;
      }

      statusEl.textContent = "Dokument wird erstellt …";
      statusEl.className = "form-message";

      const { data: fullItems, error } = await supabaseClient
        .from("mantras")
        .select("id, name_deutsch, author, mantra_text, base_capo, translation, meaning")
        .in("id", selectedIds);

      if (error) {
        statusEl.textContent = "Fehler beim Laden: " + error.message;
        statusEl.className = "form-message error";
        return;
      }

      const ordered = selectedIds.map(id => fullItems.find(f => f.id === id)).filter(Boolean);
      const { Document, Packer, Paragraph, TextRun, HeadingLevel } = window.docx;

      const children = [];
      ordered.forEach((m, idx) => {
        if (idx > 0) {
          children.push(new Paragraph({ text: "", pageBreakBefore: true }));
        }
        children.push(new Paragraph({ text: m.name_deutsch, heading: HeadingLevel.HEADING_1 }));
        if (m.author) {
          children.push(new Paragraph({ children: [new TextRun({ text: "von " + m.author, italics: true })] }));
        }

        if (m.mantra_text) {
          const baseCapo = m.base_capo || 0;
          children.push(new Paragraph({ text: "", spacing: { before: 200 } }));
          children.push(new Paragraph({ children: [new TextRun({ text: `Original (Capo ${baseCapo})`, bold: true })] }));
          m.mantra_text.split("\n").forEach(line => {
            children.push(new Paragraph({ children: [new TextRun({ text: line || " ", font: "Courier New" })] }));
          });

          if (baseCapo !== 0) {
            const chordSequence = extractChordProgression(m.mantra_text, baseCapo);
            children.push(new Paragraph({ text: "", spacing: { before: 200 } }));
            children.push(new Paragraph({ children: [new TextRun({ text: "Ohne Capo", bold: true })] }));
            children.push(new Paragraph({ children: [new TextRun({ text: chordSequence.join(" / "), font: "Courier New" })] }));
          }
        }
      });

      const doc = new Document({ sections: [{ children }] });

      try {
        const blob = await Packer.toBlob(doc);
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "mantras_export_" + new Date().toISOString().slice(0, 10) + ".docx";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        statusEl.textContent = "Export heruntergeladen.";
        statusEl.className = "form-message success";
      } catch (e) {
        statusEl.textContent = "Fehler beim Erstellen des Dokuments: " + e.message;
        statusEl.className = "form-message error";
      }
    });

    function downloadFile(content, filename, mime) {
      const blob = new Blob(["\uFEFF" + content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function csvEscape(val) {
      const str = String(val == null ? "" : val);
      if (/[;"\n]/.test(str)) return '"' + str.replace(/"/g, '""') + '"';
      return str;
    }

    function todayStr() {
      return new Date().toISOString().slice(0, 10);
    }

    function setBackupStatus(text, isError) {
      const el = document.getElementById("backup-status");
      el.textContent = text;
      el.style.color = isError ? "var(--color-error, #A6483A)" : "var(--color-text-muted)";
    }

    // ============================================================
    // CSV-Export
    // ============================================================
    document.getElementById("export-csv-btn").addEventListener("click", () => {
      const rows = [["Name Deutsch", "Autor", "Kategorie", "Erfasst", "Geprüft", "Medien vorhanden"]];
      allItems.slice()
        .sort((a, b) => a.name_deutsch.localeCompare(b.name_deutsch, "de"))
        .forEach(a => {
          const categories = (a.mantra_category_links || [])
            .map(cl => cl.mantra_categories ? cl.mantra_categories.name : "")
            .filter(Boolean)
            .join(", ");
          rows.push([
            a.name_deutsch,
            a.author || "",
            categories,
            a.reviewed ? "Ja" : "Nein",
            a.verified ? "Ja" : "Nein",
            (a.mantra_media && a.mantra_media.length > 0) ? "Ja" : "Nein",
          ]);
        });
      const csv = rows.map(r => r.map(csvEscape).join(";")).join("\r\n");
      downloadFile(csv, "mantras_export_" + todayStr() + ".csv", "text/csv;charset=utf-8;");
      setBackupStatus("CSV-Export heruntergeladen.");
    });

    // ============================================================
    // Backup erstellen (JSON mit allen Mantra-Tabellen)
    // ============================================================
    const BACKUP_TABLES = ["mantra_categories", "mantras", "mantra_benefits", "mantra_media", "mantra_category_links"];

    document.getElementById("create-backup-btn").addEventListener("click", async () => {
      setBackupStatus("Backup wird erstellt …");
      const backup = { created_at: new Date().toISOString(), version: 1, data: {} };

      for (const table of BACKUP_TABLES) {
        const { data, error } = await supabaseClient.from(table).select("*");
        if (error) {
          setBackupStatus("Fehler beim Sichern von " + table + ": " + error.message, true);
          return;
        }
        backup.data[table] = data;
      }

      downloadFile(JSON.stringify(backup, null, 2), "mantras-backup_" + todayStr() + ".json", "application/json");
      setBackupStatus("Backup heruntergeladen. Hinweis: Bild-/Video-/Audiodateien selbst liegen weiterhin im Storage-Bucket und sind in dieser Datei nicht enthalten.");
    });

    // ============================================================
    // Backup restoren
    // ============================================================
    document.getElementById("restore-backup-btn").addEventListener("click", () => {
      document.getElementById("restore-file-input").click();
    });

    document.getElementById("restore-file-input").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      e.target.value = "";
      if (!file) return;

      let backup;
      try {
        backup = JSON.parse(await file.text());
      } catch (err) {
        setBackupStatus("Diese Datei ist kein gültiges Backup (kein lesbares JSON).", true);
        return;
      }
      if (!backup.data || !backup.data.mantras) {
        setBackupStatus("Diese Datei sieht nicht wie ein gültiges Mantra-Backup aus.", true);
        return;
      }

      const backupDate = backup.created_at ? new Date(backup.created_at).toLocaleString("de-CH") : "unbekannt";
      const sure1 = confirm(
        `Achtung: Das ersetzt ALLE aktuellen Mantras durch den Stand vom ${backupDate}.\n` +
        `Alle seither vorgenommenen Änderungen gehen verloren. Das kann nicht rückgängig gemacht werden.\n\nFortfahren?`
      );
      if (!sure1) return;
      const sure2 = confirm("Bist du wirklich sicher? Bitte bestätige ein zweites Mal, um fortzufahren.");
      if (!sure2) return;

      setBackupStatus("Wiederherstellung läuft …");

      const refTables = ["mantra_categories"];
      for (const table of refTables) {
        const rows = backup.data[table] || [];
        if (rows.length) {
          const { error } = await supabaseClient.from(table).upsert(rows, { onConflict: "id" });
          if (error) {
            setBackupStatus("Fehler beim Wiederherstellen von " + table + ": " + error.message, true);
            return;
          }
        }
      }

      const { error: deleteError } = await supabaseClient
        .from("mantras")
        .delete()
        .neq("id", "00000000-0000-0000-0000-000000000000");
      if (deleteError) {
        setBackupStatus("Fehler beim Leeren der bestehenden Daten: " + deleteError.message, true);
        return;
      }

      const restoreOrder = ["mantras", "mantra_benefits", "mantra_media", "mantra_category_links"];
      for (const table of restoreOrder) {
        const rows = backup.data[table] || [];
        if (rows.length) {
          const { error } = await supabaseClient.from(table).insert(rows);
          if (error) {
            setBackupStatus("Fehler beim Wiederherstellen von " + table + ": " + error.message, true);
            return;
          }
        }
      }

      setBackupStatus("Wiederherstellung abgeschlossen. Seite wird neu geladen …");
      setTimeout(() => window.location.reload(), 1200);
    });

    init();
  </script>
</body>
</html>
