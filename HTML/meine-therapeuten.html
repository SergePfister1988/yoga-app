<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meine Therapeut:innen – Yoga-App</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cormorant+Garamond:wght@500;600;700&family=Work+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
:root {
  --color-bg: #FDFCFB; --color-surface: #FFFFFF; --color-pine: #572E2A; --color-pine-dark: #3E211D;
  --color-sand: #DBAEA4; --color-sand-dark: #C08F84; --color-text: #1E2622; --color-text-muted: #5B6660;
  --color-border: #DBDFD5; --color-error: #A6483A;
  --font-display: "Cormorant Garamond", Georgia, serif; --font-script: "Alex Brush", cursive; --font-body: "Work Sans", "Segoe UI", sans-serif;
}
* { box-sizing: border-box; }
body { margin: 0; font-family: var(--font-body); background-color: var(--color-bg); color: var(--color-text); min-height: 100vh; }
a { color: inherit; text-decoration: none; }
.app-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 32px; background: var(--color-surface); border-bottom: 1px solid var(--color-border); }
.nav-links { display: flex; gap: 20px; margin-left: 32px; flex-wrap: wrap; }
.nav-links a { font-size: 14px; color: var(--color-text-muted); font-weight: 600; }
.nav-links a.active, .nav-links a:hover { color: var(--color-pine); }
.header-left { display: flex; align-items: center; flex-wrap: wrap; }
.role-badge { display: inline-block; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; background: var(--color-sand); color: #fff; margin-left: 10px; }
.btn-secondary { padding: 8px 16px; background: transparent; color: var(--color-pine-dark); border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); cursor: pointer; text-decoration: none; display: inline-block; }
.btn-secondary:hover { border-color: var(--color-pine); }
.btn-toggle { padding: 7px 14px; border-radius: 3px; font-size: 13px; font-family: var(--font-body); font-weight: 600; cursor: pointer; border: 1px solid var(--color-border); background: transparent; color: var(--color-pine-dark); }
.btn-toggle.activate { background: var(--color-sand); color: #fff; border-color: transparent; }
.btn-toggle.activate:hover { background: var(--color-sand-dark); }
.btn-toggle.deactivate:hover { border-color: var(--color-error); color: var(--color-error); }
.app-main { padding: 32px; max-width: 900px; margin: 0 auto; }
.app-main h1 { font-family: var(--font-display); color: var(--color-pine-dark); margin-top: 0; }
.app-main > p.intro { color: var(--color-text-muted); font-size: 14px; margin-top: -10px; margin-bottom: 24px; }
.filter-bar { margin-bottom: 20px; }
.filter-bar input { width: 100%; padding: 10px 12px; border: 1px solid var(--color-border); border-radius: 3px; font-size: 14px; font-family: var(--font-body); background: var(--color-surface); }
.therapist-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 4px; padding: 18px 20px; margin-bottom: 14px; }
.therapist-top { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
.therapist-name { font-family: var(--font-display); font-size: 19px; color: var(--color-pine-dark); }
.therapist-email { font-size: 12px; color: var(--color-text-muted); }
.status-badge { font-size: 11px; font-weight: 600; padding: 3px 9px; border-radius: 12px; }
.status-badge.active { background: rgba(87,46,42,0.08); color: var(--color-pine); }
.status-badge.inactive { background: rgba(192,143,132,0.18); color: var(--color-sand-dark); }
.therapist-section { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--color-border); }
.therapist-section-title { font-size: 12px; color: var(--color-text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 8px; }
.yogini-chip-list { display: flex; flex-wrap: wrap; gap: 8px; }
.yogini-chip { font-size: 13px; padding: 5px 12px; background: var(--color-bg); border-radius: 12px; border: 1px solid var(--color-border); }
.yogini-chip.shared { border-style: dashed; color: var(--color-text-muted); }
.action-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; align-items: center; }
.empty-state { color: var(--color-text-muted); padding: 40px 0; text-align: center; }
@media (max-width: 640px) {
  .app-header { flex-wrap: wrap; gap: 10px; padding: 14px 16px; }
  .nav-links { margin-left: 0; gap: 14px; }
  .app-main { padding: 20px 16px; }
  .therapist-top { flex-direction: column; }
}
.brand-banner { background: linear-gradient(135deg, #C08F84 0%, #E3C4BC 55%, #EBD3CC 100%); display: flex; justify-content: center; align-items: center; padding: 10px 20px; }
.brand-lockup { display: inline-flex; flex-direction: column; align-items: flex-end; text-decoration: none; line-height: 1; }
.brand-script { font-family: var(--font-script); font-weight: 400; font-size: 44px; color: var(--color-pine-dark); }
.brand-serif { font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--color-pine-dark); margin-top: -6px; letter-spacing: 0.01em; }
@media (max-width: 640px) { .brand-banner { padding: 8px 16px; } .brand-script { font-size: 32px; } .brand-serif { font-size: 14px; } }
  </style>
</head>
<body>
  <div class="brand-banner"><a href="dashboard.html" class="brand-lockup"><span class="brand-script">Pandora</span><span class="brand-serif">Community Bern</span></a></div>
  <header class="app-header">
    <div class="header-left">
      <nav class="nav-links">
        <a href="dashboard.html">Dashboard</a>

        <a href="verwaltung.html" id="nav-verwaltung" style="display:none;">Verwaltung</a>
        <a href="users.html" id="nav-users" style="display:none;">Benutzer</a>
      </nav>
      <span class="role-badge" id="role-badge" style="display:none;"></span>
    </div>
    <button class="btn-secondary" id="logout-btn">Ausloggen</button>
  </header>

  <main class="app-main">
    <h1>Meine Therapeut:innen</h1>
    <p class="intro">Übersicht aller Therapeut:innen mit Status und betreuten Yogi:nis. Aus Datenschutzgründen werden hier nur Namen und Zuordnungen angezeigt, keine Akten- oder Gesundheitsdaten.</p>

    <div class="filter-bar">
      <input type="text" id="f-search" placeholder="Therapeut:in suchen..." />
    </div>

    <div id="therapist-list"></div>
    <p id="empty-state" class="empty-state" style="display:none;"></p>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = "https://yqklyumvybthkzlbsspj.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable__DLVShYfXjf0C27LLK1zbg_5vpFcxJy";
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    function roleLabel(role, gender) {
      if (role === "admin") return "Admin";
      if (role === "therapeut") {
        if (gender === "frau") return "Therapeutin";
        if (gender === "mann") return "Therapeut";
        return "Therapeut:in";
      }
      if (role === "yogi") {
        if (gender === "frau") return "Yogini";
        if (gender === "mann") return "Yogi";
        return "Yogi:ni";
      }
      if (role === "anbieter") {
        if (gender === "frau") return "Anbieterin";
        if (gender === "mann") return "Anbieter";
        return "Anbieter:in";
      }
      return role;
    }

    function displayName(p) {
      const parts = [p.first_name, p.last_name].filter(Boolean);
      return parts.length ? parts.join(" ") : p.email;
    }

    function escapeHtml(str) {
      const div = document.createElement("div");
      div.textContent = str || "";
      return div.innerHTML;
    }

    let allTherapists = [];

    async function init() {
      const { data: sessionData } = await supabaseClient.auth.getSession();
      if (!sessionData.session) { window.location.href = "index.html"; return; }

      const { data: profile } = await supabaseClient.from("profiles").select("role, gender").eq("id", sessionData.session.user.id).single();
      if (!profile || profile.role !== "admin") {
        alert("Diese Seite ist nur für Admins.");
        window.location.href = "dashboard.html";
        return;
      }

      const badge = document.getElementById("role-badge");
      badge.textContent = roleLabel(profile.role, profile.gender);
      badge.style.display = "inline-block";
        if (profile.role === "admin" || profile.role === "therapeut") {
          const nv = document.getElementById("nav-verwaltung");
          if (nv) nv.style.display = "inline";
        }
        if (profile.role === "admin") {
          const nu = document.getElementById("nav-users");
          if (nu) nu.style.display = "inline";
        }
        if (profile.role === "anbieter") {
          }

      await loadTherapists();
    }

    async function loadTherapists() {
      const { data: therapists, error } = await supabaseClient
        .from("profiles")
        .select("id, email, first_name, last_name, gender, active, active_until, created_at")
        .eq("role", "therapeut")
        .order("created_at");

      if (error) {
        document.getElementById("empty-state").style.display = "block";
        document.getElementById("empty-state").textContent = "Fehler beim Laden: " + error.message;
        return;
      }
      if (!therapists || !therapists.length) {
        document.getElementById("empty-state").style.display = "block";
        document.getElementById("empty-state").textContent = "Es sind noch keine Therapeut:innen erfasst.";
        return;
      }

      const therapistIds = therapists.map(t => t.id);

      const [{ data: assignedYoginis }, { data: sharedLinks }] = await Promise.all([
        supabaseClient.from("profiles").select("id, first_name, last_name, email, assigned_therapist_id").eq("role", "yogi").in("assigned_therapist_id", therapistIds),
        supabaseClient.from("therapist_shares").select("yogi_id, therapist_id").in("therapist_id", therapistIds),
      ]);

      let sharedYoginiProfiles = [];
      const sharedYogiIds = [...new Set((sharedLinks || []).map(s => s.yogi_id))];
      if (sharedYogiIds.length) {
        const { data } = await supabaseClient.from("profiles").select("id, first_name, last_name, email").in("id", sharedYogiIds);
        sharedYoginiProfiles = data || [];
      }

      allTherapists = therapists.map(t => ({
        ...t,
        assignedYoginis: (assignedYoginis || []).filter(y => y.assigned_therapist_id === t.id),
        sharedYoginis: (sharedLinks || [])
          .filter(s => s.therapist_id === t.id)
          .map(s => sharedYoginiProfiles.find(p => p.id === s.yogi_id))
          .filter(Boolean),
      }));

      renderList();
    }

    function renderList() {
      const search = document.getElementById("f-search").value.trim().toLowerCase();
      const listEl = document.getElementById("therapist-list");
      const emptyEl = document.getElementById("empty-state");
      listEl.innerHTML = "";

      const filtered = allTherapists.filter(t => displayName(t).toLowerCase().includes(search) || t.email.toLowerCase().includes(search));

      if (!filtered.length) {
        emptyEl.style.display = "block";
        emptyEl.textContent = "Keine passenden Therapeut:innen gefunden.";
        return;
      }
      emptyEl.style.display = "none";

      filtered.forEach(t => {
        const isCurrentlyActive = t.active && (!t.active_until || new Date(t.active_until) > new Date());
        const card = document.createElement("div");
        card.className = "therapist-card";

        const totalCount = t.assignedYoginis.length + t.sharedYoginis.length;
        const chipsHtml = [
          ...t.assignedYoginis.map(y => `<span class="yogini-chip">${escapeHtml(displayName(y))}</span>`),
          ...t.sharedYoginis.map(y => `<span class="yogini-chip shared">${escapeHtml(displayName(y))} (geteilt)</span>`),
        ].join("") || `<p style="font-size:13px; color: var(--color-text-muted); margin:0;">Noch keine Yogi:nis zugewiesen.</p>`;

        card.innerHTML = `
          <div class="therapist-top">
            <div>
              <div class="therapist-name">${escapeHtml(displayName(t))}</div>
              <div class="therapist-email">${escapeHtml(t.email)}</div>
            </div>
            <span class="status-badge ${isCurrentlyActive ? "active" : "inactive"}">${isCurrentlyActive ? "Aktiv" : "Inaktiv"}</span>
          </div>

          <div class="therapist-section">
            <div class="therapist-section-title">Betreute Yogi:nis (${totalCount})</div>
            <div class="yogini-chip-list">${chipsHtml}</div>
          </div>

          <div class="action-row">
            <a href="users.html" class="btn-secondary">In Benutzerverwaltung öffnen</a>
            <button class="btn-toggle ${isCurrentlyActive ? "deactivate" : "activate"}" data-action="toggle-active">
              ${isCurrentlyActive ? "Deaktivieren" : "Aktivieren"}
            </button>
          </div>
        `;

        const toggleBtn = card.querySelector('[data-action="toggle-active"]');
        toggleBtn.addEventListener("click", async () => {
          toggleBtn.disabled = true;
          const { error } = await supabaseClient.from("profiles").update({ active: !isCurrentlyActive }).eq("id", t.id);
          if (error) {
            alert("Fehler: " + error.message);
            toggleBtn.disabled = false;
            return;
          }
          await loadTherapists();
        });

        listEl.appendChild(card);
      });
    }

    document.getElementById("f-search").addEventListener("input", renderList);

    document.getElementById("logout-btn").addEventListener("click", async () => {
      await supabaseClient.auth.signOut();
      window.location.href = "index.html";
    });

    init();
  </script>
</body>
</html>
